<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>🧩 코딩 기초 — Coding Basics</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI','Malgun Gothic',sans-serif}
  :root{
    --bg:#0d0f1a; --panel:#151827; --panel2:#1c2036; --line:#2a2f4a;
    --accent:#7ee0ff; --accent2:#ffce54; --txt:#e8ecf5; --dim:#8b93ad;
    --good:#5ad17a; --bad:#ff5a78;
  }
  body{background:var(--bg);color:var(--txt);height:100vh;overflow:hidden}
  #app{display:flex;height:100vh}

  /* ── 사이드바 ── */
  #sidebar{width:220px;flex:none;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;overflow-y:auto;height:100vh}
  #sidebar h1{font-size:15px;padding:16px 14px;border-bottom:1px solid var(--line);
    cursor:pointer;display:flex;align-items:center;justify-content:space-between;user-select:none}
  #sidebar h1:hover{background:var(--panel2)}
  #lessonListArrow{font-size:11px;color:var(--dim);transition:transform .15s;display:inline-block}
  #lessonListArrow.collapsed{transform:rotate(-90deg)}
  #lessonList.collapsed{display:none}
  .lesson{padding:12px 14px;cursor:pointer;font-size:13px;color:var(--dim);border-left:3px solid transparent}
  .lesson:hover{background:var(--panel2);color:var(--txt)}
  .lesson.active{background:var(--panel2);color:var(--accent);border-left-color:var(--accent);font-weight:700}
  .lesson .num{color:var(--accent2);font-weight:700;margin-right:6px}

  /* ── 메인 ── */
  #main{flex:1;display:flex;flex-direction:column;overflow:hidden}
  #header{padding:16px 22px;border-bottom:1px solid var(--line);background:linear-gradient(#161a2c,#0d0f1a)}
  #header h2{font-size:20px}
  #header p{font-size:12px;color:var(--dim);margin-top:4px}
  #content{flex:1;display:flex;gap:14px;padding:16px 22px;overflow:hidden}

  #explain{flex:1;overflow-y:auto;padding-right:8px;font-size:14px;line-height:1.75}
  #explain h3{color:var(--accent2);font-size:15px;margin:14px 0 6px}
  #explain h3:first-child{margin-top:0}
  #explain code{background:var(--panel2);border:1px solid var(--line);border-radius:5px;
    padding:1px 6px;font-family:Consolas,monospace;color:var(--accent)}
  #explain ul{margin:6px 0 6px 18px}
  #explain .tip{margin-top:10px;padding:10px 12px;border-radius:8px;border:1px solid var(--accent2);
    background:rgba(255,206,84,.08);font-size:12.5px}
  #explain .quiz{margin-top:16px;padding:12px 14px;border-radius:10px;border:1px solid var(--accent);
    background:rgba(126,224,255,.06)}
  #explain .quiz .qh{font-size:12px;font-weight:700;color:var(--accent);margin-bottom:6px}
  #explain .quiz .qb{font-size:13px;line-height:1.6}
  #explain .quiz .qhint{margin-top:8px;font-size:12px;color:var(--dim);cursor:pointer;text-decoration:underline dotted}
  #explain .quiz .qhintbody{display:none;margin-top:6px;font-size:12px;color:var(--dim)}
  #explain .quiz .qhintbody.show{display:block}
  #explain .quiz .qnav{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  #explain .quiz .qnav .qind{font-size:11.5px;color:var(--dim);font-weight:700}
  #explain code.kterm{cursor:pointer;border-bottom:1px dashed var(--accent)}
  #explain code.kterm:hover{background:rgba(126,224,255,.18)}
  #kdetailPanel{display:none;margin-top:14px;padding:12px 14px;border-radius:10px;
    border:1px solid var(--accent2);background:rgba(255,206,84,.08)}
  #kdetailPanel.show{display:block}
  #kdetailPanel .kh{font-size:12.5px;font-weight:700;color:var(--accent2);margin-bottom:6px}
  #kdetailPanel .kb{font-size:12.5px;line-height:1.65;color:var(--txt)}
  #stepnav{display:flex;align-items:center;gap:10px;margin-bottom:14px;padding-bottom:10px;
    border-bottom:1px solid var(--line)}
  #stepnav .stepbtn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:6px 12px;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap}
  #stepnav .stepbtn:disabled{opacity:.35;cursor:default}
  #stepnav .stepind{flex:1;text-align:center;font-size:12px;color:var(--dim);font-weight:700;letter-spacing:.5px}
  #stepnav .dots{display:flex;gap:5px;justify-content:center}
  #stepnav .dot{width:7px;height:7px;border-radius:50%;background:var(--line)}
  #stepnav .dot.on{background:var(--accent)}

  #lab{flex:1;display:flex;flex-direction:column;min-width:0}
  #lab h4{font-size:12px;color:var(--dim);margin-bottom:6px;letter-spacing:.5px}
  #editor{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    color:var(--txt);font-family:Consolas,monospace;font-size:13.5px;padding:12px;resize:none;
    outline:none;line-height:1.6;tab-size:2}
  #editor:focus{border-color:var(--accent)}
  #labBtns{display:flex;gap:8px;margin:10px 0}
  .btn{background:var(--panel2);border:1px solid var(--line);color:var(--txt);
    padding:8px 16px;border-radius:8px;font-size:12.5px;font-weight:700;cursor:pointer}
  .btn:active{transform:scale(.96)}
  #runBtn{background:var(--accent);color:#0d0f1a;border:none}
  #checkBtn{background:var(--good);color:#0d0f1a;border:none}
  #resetBtn{color:var(--dim)}
  #gradeResult{margin-top:8px;padding:9px 12px;border-radius:8px;font-size:12.5px;font-weight:700;display:none}
  #gradeResult.ok{display:block;background:rgba(90,209,122,.12);border:1px solid var(--good);color:var(--good)}
  #gradeResult.no{display:block;background:rgba(255,90,120,.12);border:1px solid var(--bad);color:var(--bad)}
  #output{height:130px;background:#0a0c14;border:1px solid var(--line);border-radius:10px;
    padding:10px 12px;overflow-y:auto;font-family:Consolas,monospace;font-size:12.5px;line-height:1.6}
  #output .line{white-space:pre-wrap;word-break:break-all}
  #output .err{color:var(--bad)}
  #output .ph{color:var(--dim)}

  #navBtns{display:flex;justify-content:space-between;padding:0 22px 16px}

  /* ── 용어 사전 ── */
  #glossaryView{display:none;flex-direction:column;flex:1;padding:16px 22px;overflow:hidden}
  #glossaryView.show{display:flex}
  #glossaryHead{display:flex;gap:10px;margin-bottom:12px}
  #glossarySearch{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    color:var(--txt);padding:10px 12px;font-size:13px;outline:none}
  #glossarySearch:focus{border-color:var(--accent)}
  #glossaryList{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
  .gcat{font-size:13px;font-weight:800;color:var(--accent2);margin:14px 0 2px;padding-top:6px;
    border-top:1px solid var(--line)}
  .gcat:first-child{margin-top:0;border-top:none;padding-top:0}
  .gterm{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:10px 14px}
  .gterm .gname{font-size:14px;font-weight:700;color:var(--accent);cursor:pointer;display:flex;align-items:center;gap:6px}
  .gterm .gname:hover{text-decoration:underline}
  .gterm .gname .gcode{font-family:Consolas,monospace;color:var(--accent2);margin-left:6px;font-size:12px}
  .gterm .gname .garrow{margin-left:auto;font-size:11px;color:var(--dim);transition:transform .15s}
  .gterm.open .gname .garrow{transform:rotate(90deg)}
  .gterm .gdef{font-size:12.5px;color:var(--dim);margin-top:4px;line-height:1.55}
  .gterm .gdetail{display:none;margin-top:8px;padding-top:8px;border-top:1px dashed var(--line);
    font-size:12.5px;color:var(--txt);line-height:1.65}
  .gterm.open .gdetail{display:block}
  .gterm .gdetail code{background:var(--panel);border:1px solid var(--line);border-radius:5px;
    padding:1px 6px;font-family:Consolas,monospace;color:var(--accent)}

  /* ── 질문하기 ── */
  #askView{display:none;flex-direction:column;flex:1;padding:16px 22px;overflow:hidden}
  #askView.show{display:flex}
  #askHead{display:flex;gap:10px;margin-bottom:10px}
  #askInput{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    color:var(--txt);padding:10px 12px;font-size:13px;outline:none}
  #askInput:focus{border-color:var(--accent)}
  #askSubmit{background:var(--accent);color:#0d0f1a;border:none}
  #askChips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px}
  .askChip{background:var(--panel2);border:1px solid var(--line);border-radius:20px;
    padding:5px 12px;font-size:11.5px;color:var(--dim);cursor:pointer}
  .askChip:hover{border-color:var(--accent);color:var(--accent)}
  #askLog{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
  .askQ{align-self:flex-end;max-width:80%;background:var(--accent);color:#0d0f1a;
    border-radius:12px 12px 2px 12px;padding:9px 13px;font-size:13px;font-weight:700}
  .askA{align-self:flex-start;max-width:85%;background:var(--panel2);border:1px solid var(--line);
    border-radius:12px 12px 12px 2px;padding:10px 14px;font-size:13px;line-height:1.65}
  .askA .aterm{font-size:11.5px;color:var(--accent2);font-weight:700;margin-bottom:4px}
  .askA code{background:var(--panel);border:1px solid var(--line);border-radius:5px;
    padding:1px 6px;font-family:Consolas,monospace;color:var(--accent)}
  .askA.miss{color:var(--dim)}

  /* ── 시험 ── */
  #examSetupView,#examResultView{display:none;flex-direction:column;flex:1;padding:16px 22px;overflow:hidden}
  #examSetupView.show,#examResultView.show{display:flex}
  #examSetupHead h3{font-size:15px;margin-bottom:10px}
  #examSetupBtns{display:flex;gap:8px;margin-bottom:12px}
  #examLessonList{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
  .examLessonRow{display:flex;align-items:center;gap:10px;background:var(--panel2);
    border:1px solid var(--line);border-radius:8px;padding:10px 12px;cursor:pointer;font-size:13px}
  .examLessonRow:hover{border-color:var(--accent)}
  .examLessonRow input{width:16px;height:16px;flex:none}
  .examLessonRow .elCount{margin-left:auto;font-size:11.5px;color:var(--dim)}
  #examStartBar{display:flex;align-items:center;gap:14px;margin-top:12px;padding-top:12px;
    border-top:1px solid var(--line)}
  #examStartCount{font-size:12.5px;color:var(--dim);font-weight:700}
  #examStartBtn{background:var(--good);color:#0d0f1a;border:none}
  #examStartBtn:disabled{opacity:.4;cursor:default}
  #examResultBody{flex:1;overflow-y:auto}
  #examResultBody h2{font-size:22px;margin-bottom:6px}
  #examResultBody .escore{font-size:15px;color:var(--accent);font-weight:700;margin-bottom:14px}
  .ereview{background:var(--panel2);border:1px solid var(--line);border-radius:10px;
    padding:10px 14px;margin-bottom:8px}
  .ereview.wrong{border-color:var(--bad)}
  .ereview.right{border-color:var(--good)}
  .ereview .erhead{font-size:12px;font-weight:700;margin-bottom:4px}
  .ereview.wrong .erhead{color:var(--bad)}
  .ereview.right .erhead{color:var(--good)}
  .ereview .erq{font-size:12.5px;color:var(--txt);line-height:1.6}
  #examResultBtns{display:flex;gap:8px;margin-top:14px;padding-top:12px;border-top:1px solid var(--line)}

  ::-webkit-scrollbar{width:8px}
  ::-webkit-scrollbar-thumb{background:var(--line);border-radius:8px}

  @media(max-width:820px){
    #sidebar{width:70px}
    #sidebar h1,.lesson .txt{display:none}
    .lesson{text-align:center}
    #content{flex-direction:column;overflow-y:auto}
    #lab{min-height:400px}
  }
</style>
</head>
<body>
<div id="app">
  <div id="sidebar">
    <h1 id="lessonListToggle">🧩 코딩 기초 <span id="lessonListArrow">▾</span></h1>
    <div id="lessonList"></div>
    <div class="lesson" id="examBtn" style="border-top:1px solid var(--line);color:var(--good)">
      <span class="num">🧪</span><span class="txt">시험 보기</span>
    </div>
    <div class="lesson" id="glossaryBtn" style="color:var(--accent2)">
      <span class="num">📖</span><span class="txt">용어 사전 전체보기</span>
    </div>
    <div class="lesson" id="askBtn" style="color:var(--accent)">
      <span class="num">❓</span><span class="txt">질문하기</span>
    </div>
  </div>
  <div id="main">
    <div id="header">
      <h2 id="hTitle"></h2>
      <p id="hSub"></p>
    </div>
    <div id="content">
      <div id="explain"></div>
      <div id="lab">
        <h4>✏️ 직접 코드를 고쳐서 실행해보세요 (JavaScript)</h4>
        <textarea id="editor" spellcheck="false"></textarea>
        <div id="labBtns">
          <button class="btn" id="runBtn">▶ 실행</button>
          <button class="btn" id="checkBtn">✅ 채점하기</button>
          <button class="btn" id="resetBtn">↺ 예제로 초기화</button>
        </div>
        <div id="output"><div class="ph line">// 실행 결과가 여기 표시됩니다</div></div>
        <div id="gradeResult"></div>
      </div>
    </div>
    <div id="glossaryView">
      <div id="glossaryHead">
        <input id="glossarySearch" placeholder="🔍 용어 검색 (예: 배열, 함수, 반복문...)">
        <button class="btn" id="glossaryClose">✕ 닫고 레슨으로</button>
      </div>
      <div id="glossaryList"></div>
    </div>
    <div id="askView">
      <div id="askHead">
        <input id="askInput" placeholder="🤔 궁금한 걸 물어보세요 (예: 변수가 뭐예요?, 반복문은 언제 써요?)">
        <button class="btn" id="askSubmit">물어보기</button>
        <button class="btn" id="askClose">✕ 닫고 레슨으로</button>
      </div>
      <div id="askChips"></div>
      <div id="askLog"></div>
    </div>
    <div id="examSetupView">
      <div id="examSetupHead">
        <h3>🧪 시험 볼 레슨을 선택하세요 (복수 선택 가능)</h3>
        <div id="examSetupBtns">
          <button class="btn" id="examSelectAll">전체 선택</button>
          <button class="btn" id="examSelectNone">전체 해제</button>
          <button class="btn" id="examSetupClose">✕ 닫고 레슨으로</button>
        </div>
      </div>
      <div id="examLessonList"></div>
      <div id="examStartBar">
        <span id="examStartCount">0문제 선택됨</span>
        <button class="btn" id="examStartBtn" disabled>🚀 시험 시작</button>
      </div>
    </div>
    <div id="examResultView">
      <div id="examResultBody"></div>
      <div id="examResultBtns">
        <button class="btn" id="examRetryBtn">🔁 같은 범위로 다시 보기</button>
        <button class="btn" id="examBackBtn">✕ 닫고 레슨으로</button>
      </div>
    </div>
    <div id="navBtns">
      <button class="btn" id="prevBtn">← 이전 레슨</button>
      <button class="btn" id="nextBtn">다음 레슨 →</button>
    </div>
  </div>
</div>

<script>
const LESSONS=[
{
  title:'코딩이 뭐예요?',
  sub:'아무것도 몰라도 괜찮아요, 여기서부터 시작해요',
  html:`
    <h3>코딩(coding)이란?</h3>
    <p>컴퓨터는 아주 똑똑해 보이지만, 사실 시키는 대로만 하는 기계예요.
    문제는 컴퓨터가 우리말(한국어)을 못 알아듣는다는 거죠.</p>
    <p>그래서 컴퓨터가 알아들을 수 있는 <b>정해진 말투(언어)</b>로
    "이렇게 저렇게 해줘"라고 순서대로 적어주는 것, 그게 바로 <b>코딩</b>이에요.</p>
    <h3>예를 들면?</h3>
    <p>친구에게 "라면 끓이는 법"을 알려준다고 생각해보세요.</p>
    <ul>
      <li>1. 냄비에 물 500ml를 넣는다</li>
      <li>2. 물을 끓인다</li>
      <li>3. 면과 스프를 넣는다</li>
      <li>4. 4분 더 끓인다</li>
    </ul>
    <p>이렇게 <b>순서대로, 정확하게</b> 적은 설명서가 바로 "프로그램"이고,
    이 설명서를 컴퓨터가 알아듣는 말로 쓰는 게 코딩입니다.</p>
    <div class="tip">💡 오른쪽 상자는 컴퓨터에게 직접 명령을 내려보는 연습장이에요.
    코드를 몰라도 되니, 일단 <b>▶ 실행</b> 버튼만 눌러보세요!</div>
    <h3>처음 배울 때 흔한 오해</h3>
    <ul>
      <li>"코딩 = 어려운 수학"이라고 생각하기 쉽지만, 사실은 <b>글쓰기에 더 가까워요</b>. 순서와 규칙만 정확히 지키면 돼요.</li>
      <li>한 번에 완벽한 코드를 써야 한다는 부담을 가질 필요 없어요. 실제 개발자도 계속 틀리고 고치면서(디버깅) 코드를 완성해요.</li>
      <li>영어 단어(console, log 등)가 낯설어도 괜찮아요. 처음엔 "이 단어는 이런 뜻이구나" 하고 하나씩 외워가면 됩니다.</li>
    </ul>
  `,
  code:`// 이 글자들이 "코드"예요.\n// 오른쪽 위 초록색 ▶ 실행 버튼을 눌러보세요!\n\nconsole.log("안녕하세요! 나의 첫 코드입니다.");`,
  quizzes:[
    {
      q:'화면(아래 실행 결과 창)에 정확히 이 문장이 나오도록 <code>console.log</code>를 써보세요:<br><b>나는 코딩을 시작했다!</b>',
      starter:`// 아래에 코드를 작성해보세요\n`,
      hint:'console.log("나는 코딩을 시작했다!"); 처럼 큰따옴표 안에 문장을 그대로 넣으면 돼요.',
      check:logs=>logs.some(t=>t.includes('나는 코딩을 시작했다!')),
    },
    {
      q:'<b>"안녕 세계"</b>가 화면에 나오도록 console.log를 써보세요.',
      starter:`// "안녕 세계"를 출력해보세요\n`,
      hint:'console.log("안녕 세계");',
      check:logs=>logs.some(t=>t.includes('안녕 세계')),
    },
    {
      q:'첫 줄에는 <b>"Hello"</b>, 둘째 줄에는 <b>"World"</b>가 각각 나오도록 console.log를 두 번 써보세요.',
      starter:`// 두 줄로 나눠서 Hello, World를 출력해보세요\n`,
      hint:'console.log("Hello"); 그리고 다음 줄에 console.log("World");',
      check:logs=>logs.some(t=>t.includes('Hello'))&&logs.some(t=>t.includes('World')),
    },
  ]
},
{
  title:'첫 줄 써보기 (console.log)',
  sub:'컴퓨터에게 말을 걸어보는 가장 쉬운 방법',
  html:`
    <h3>console.log 란?</h3>
    <p>지금 이 화면에서 쓰는 언어는 <b>자바스크립트(JavaScript)</b>라는,

{
  title:'조건문 (if)',

  html:`
    <h3>if / else</h3>
    <p>조건이 참(true)이면 <code>if</code> 블록을, 거짓이면 <code>else</code> 블록을 실행합니다.</p>
    <ul>
      <li><code>&gt;, &lt;, &gt;=, &lt;=</code> — 크기 비교</li>
      <li><code>===</code> — 같은지 비교</li>
      <li><code>&&</code>(그리고), <code>||</code>(또는)</li>
    </ul>
    <div class="tip">💡 팁: <code>if (조건) {...} else if (조건) {...} else {...}</code> 형태로 여러 상황을 나눌 수 있어요.</div>
    <h3>자주 하는 실수</h3>
    <ul>
      <li>비교할 때 <code>=</code>(대입) 대신 실수로 <code>==</code>나 <code>===</code>(비교)를 안 쓰는 경우가 많아요. <code>if(x=5)</code>는 비교가 아니라 대입이라 의도와 다르게 동작해요.</li>
      <li>조건은 <b>위에서부터 순서대로</b> 검사돼서, 먼저 맞는 조건 하나만 실행되고 끝나요. 순서를 잘못 배치하면 원하는 결과가 안 나올 수 있어요.</li>
      <li>중괄호 <code>{ }</code>를 빼먹으면 바로 다음 한 줄만 if의 영향을 받아요. 여러 줄을 묶으려면 꼭 중괄호로 감싸세요.</li>

{

  html:`
    <h3>비교 연산자</h3>
    <ul>
      <li><code>===</code> — 값과 <b>타입까지</b> 같은지 비교 (권장!)</li>
      <li><code>==</code> — 값만 대충 비교 (타입이 달라도 같다고 나올 수 있어 헷갈림, 되도록 안 씀)</li>
      <li><code>!==</code> — 다른지 비교 (엄격하게)</li>
    </ul>
    <h3>논리 연산자</h3>
    <ul>
      <li><code>&&</code> (AND) — 양쪽 다 참이어야 참</li>
      <li><code>||</code> (OR) — 둘 중 하나만 참이어도 참</li>
      <li><code>!</code> (NOT) — 참/거짓을 반대로 뒤집음</li>
    </ul>
    <div class="tip">💡 팁: <code>"5" == 5</code>는 true지만 <code>"5" === 5</code>는 false예요. 헷갈림을 막으려면 항상 <b>===</b>를 쓰세요.</div>
    <h3>자주 하는 실수</h3>
    <ul>
      <li><code>=</code>(대입), <code>==</code>(느슨한 비교), <code>===</code>(엄격한 비교) 세 가지를 헷갈리기 쉬워요. 비교할 땐 항상 <code>===</code>를 습관화하세요.</li>
      <li><code>&&</code>와 <code>||</code>를 섞어 쓸 때 우선순위가 헷갈릴 수 있어요. 조건이 복잡하면 괄호로 묶어 의도를 명확히 하세요.</li>
      <li><code>!</code>는 바로 뒤의 값 하나만 뒤집어요. <code>!age > 18</code>처럼 쓰면 의도와 다르게 동작할 수 있어 <code>!(age > 18)</code>처럼 괄호가 필요해요.</li>
    </ul>
  `,
  code:`console.log("5" == 5);   // true (값만 비교)\nconsole.log("5" === 5);  // false (타입도 비교)\n\nconst age = 20;\nconsole.log(age > 18 && age < 65);  // 둘 다 참이어야 true\nconsole.log(age < 10 || age > 15);  // 하나만 참이어도 true\nconsole.log(!(age > 18));           // 참/거짓 뒤집기`,

    <h3>더 강력한 배열 도구</h3>

      <li><code>arr.includes(값)</code> — 배열에 그 값이 있는지 (true/false)</li>

    </ul>
    <div class="tip">💡 팁: <code>f</code> 자리에는 <code>x => x * 2</code> 처럼 짧은 <b>화살표 함수</b>를 넣는 게 일반적이에요.</div>

{
  title:'조건문 심화 (switch문)',
  sub:'if/else가 너무 많아질 때 깔끔하게 정리하는 법',
  html:`
    <h3>switch문이 필요한 이유</h3>
    <p>하나의 값을 여러 경우와 비교해서 분기해야 할 때, <code>if / else if / else if / ...</code>를
    계속 이어 쓰면 코드가 길고 읽기 어려워져요. 이럴 때 <code>switch</code>를 쓰면 훨씬 정리돼 보입니다.</p>
    <h3>기본 형태를 한 줄씩 뜯어보면</h3>
    <ul>
      <li><code>switch (값)</code> — 비교할 값을 괄호 안에 넣어요.</li>
      <li><code>case A:</code> — 값이 A와 같으면 이 아래 코드를 실행해요.</li>
      <li><code>break;</code> — 여기서 switch를 빠져나가요. <b>깜빡하면 아래 case까지 계속 실행돼요! (자주 하는 실수)</b></li>
      <li><code>default:</code> — 어떤 case와도 안 맞을 때 실행되는 부분 (if의 else와 같은 역할)</li>
    </ul>
    <div class="tip">💡 팁: switch는 "===" 방식으로 정확히 비교해요. 범위 비교(90점 이상 등)에는 안 맞고, if/else가 더 적합해요.</div>
    <h3>자주 하는 실수</h3>
    <ul>
      <li><code>break</code>를 빼먹으면, 맞는 case를 실행한 뒤에도 <b>아래 case들이 계속 이어서 실행</b>돼요 (fall-through). switch에서 가장 흔한 실수예요.</li>
      <li><code>case</code> 값은 <code>===</code>처럼 엄격하게 비교돼요. 문자열 <code>"1"</code>과 숫자 <code>1</code>은 다르게 취급돼요.</li>
      <li><code>default</code>는 꼭 마지막에 안 써도 되지만, 보통 마지막에 두는 게 읽기 편해요.</li>
    </ul>
  `,
  code:`const grade = "B";\n\nswitch (grade) {\n  case "A":\n    console.log("최우수");\n    break;\n  case "B":\n    console.log("우수");\n    break;\n  case "C":\n    console.log("보통");\n    break;\n  default:\n    console.log("등급 없음");\n}\n\n// grade 값을 "A"나 "D"로 바꿔서 결과가 어떻게 달라지는지 확인해보세요!`,

},
{
  title:'반복문 심화 (중첩 반복 & break/continue)',
  sub:'반복문 안에 반복문, 그리고 흐름을 직접 제어하는 법',
  html:`
    <h3>중첩 반복문이란?</h3>
    <p>반복문 <b>안에</b> 또 다른 반복문을 넣는 것을 말해요. 예를 들어 구구단 전체(2단~9단)를
    출력하려면, "몇 단인지"를 도는 바깥 반복문과 "1~9를 곱하는" 안쪽 반복문이 함께 필요해요.</p>
    <p>바깥 반복문이 한 번 돌 때마다, 안쪽 반복문이 <b>처음부터 끝까지 통째로</b> 실행된다는 게 핵심이에요.</p>
    <h3>break와 continue를 다시 정확히</h3>
    <ul>
      <li><code>break</code> — 반복문을 <b>완전히 멈추고</b> 빠져나가요. 이후 반복은 아예 실행 안 됨.</li>
      <li><code>continue</code> — <b>이번 한 번만</b> 건너뛰고, 다음 반복은 계속 진행돼요.</li>
    </ul>
    <div class="tip">💡 팁: 중첩 반복문에서 break는 <b>자신을 감싸고 있는 가장 가까운</b> 반복문만 멈춰요. 바깥 반복문까지 한 번에 멈추진 않아요.</div>
    <h3>자주 하는 실수</h3>
    <ul>
      <li>안쪽 for문과 바깥 for문에 <b>같은 변수 이름</b>(예: 둘 다 <code>i</code>)을 쓰면 헷갈리기 쉬워요. 바깥은 <code>i</code>, 안쪽은 <code>j</code>처럼 다르게 지으세요.</li>
      <li>중첩 반복문은 계산량이 빠르게 늘어나요. 바깥 5번 × 안쪽 5번이면 총 25번 실행된다는 걸 기억하세요.</li>
      <li><code>continue</code>는 반복문을 끝내는 게 아니라 <b>이번 한 바퀴만</b> 건너뛰는 거예요. break와 헷갈리지 마세요.</li>
    </ul>
  `,
  code:`// 구구단 2단~4단 (중첩 반복문)\nfor (let dan = 2; dan <= 4; dan++) {\n  console.log("--- " + dan + "단 ---");\n  for (let i = 1; i <= 9; i++) {\n    console.log(dan + " x " + i + " = " + (dan*i));\n  }\n}\n\n// continue 예시: 3의 배수만 건너뛰기\nfor (let i = 1; i <= 6; i++) {\n  if (i % 3 === 0) continue;\n  console.log("continue 예시:", i);\n}`,

{
  title:'배열 메서드 더 알아보기 (reduce, sort)',
  sub:'배열 하나로 합계 구하기, 정렬하기',
  html:`
    <h3>reduce — 배열을 하나의 값으로 누적하기</h3>
    <p><code>arr.reduce((누적값, 현재값) => 누적값+현재값, 시작값)</code> 형태로,
    배열의 모든 값을 순서대로 훑으면서 하나의 결과로 합쳐요. <b>합계, 평균, 최댓값</b> 등을 구할 때 자주 써요.</p>
    <p>동작을 한 단계씩 보면: 시작값에서 출발해서, 배열의 각 값을 만날 때마다
    "누적값 = 콜백함수(누적값, 현재값)"을 계속 반복해요.</p>
    <h3>sort — 정렬하기 (주의!)</h3>
    <p><code>arr.sort()</code>는 기본적으로 <b>문자 기준</b>으로 정렬돼서, 숫자 배열에 그냥 쓰면
    [1, 10, 2]처럼 이상하게 정렬될 수 있어요. 숫자를 제대로 정렬하려면 비교 함수를 넣어야 해요:
    <code>arr.sort((a,b) => a-b)</code> (오름차순)</p>
    <div class="tip">💡 팁: reduce는 처음엔 어렵게 느껴져요. "누적값에 지금 값을 계속 더해나간다"고 천천히 되새기며 연습해보세요.</div>
    <h3>자주 하는 실수</h3>
    <ul>
      <li><code>reduce</code>의 <b>시작값(두 번째 인자)을 빼먹으면</b>, 배열의 첫 번째 값이 시작값으로 자동 사용돼서 예상과 다른 결과가 나올 수 있어요.</li>
      <li><code>sort()</code>를 비교 함수 없이 숫자 배열에 쓰면 <b>문자 기준으로 정렬</b>돼서 <code>[10,2,1]</code>처럼 이상한 순서가 나와요. 숫자는 항상 <code>(a,b)=>a-b</code>를 넣으세요.</li>
      <li><code>sort()</code>는 <b>원본 배열 자체를 바꿔요</b> (map/filter와 다르게). 원본을 지키고 싶으면 <code>[...arr].sort()</code>처럼 복사부터 하세요.</li>
    </ul>
  `,
  code:`const nums = [3, 1, 4, 1, 5];\n\nconst sum = nums.reduce((acc, n) => acc + n, 0);\nconsole.log("합계:", sum);\n\nconst max = nums.reduce((acc, n) => n > acc ? n : acc, nums[0]);\nconsole.log("최댓값:", max);\n\nconst sorted = [...nums].sort((a, b) => a - b);\nconsole.log("오름차순 정렬:", sorted);`,

{
  title:'클로저 (Closure)',
  sub:'함수가 자기 주변 환경을 "기억"하는 신기한 성질',
  html:`
    <h3>클로저, 어렵게 느껴지지만 천천히 보면 쉬워요</h3>
    <p>함수 안에 또 다른 함수를 만들면, 안쪽 함수는 바깥 함수의 변수를 계속 <b>기억</b>할 수 있어요.
    바깥 함수가 이미 실행을 끝냈어도요! 이 성질을 <b>클로저</b>라고 불러요.</p>
    <h3>왜 유용할까요?</h3>
    <p>예를 들어 "카운터"를 만든다고 해봐요. 매번 count를 0부터 시작하지 않고,
    이전 값을 계속 <b>기억하면서</b> 하나씩 증가시키고 싶을 때 클로저가 딱이에요.</p>
    <ul>
      <li>바깥 함수(<code>makeCounter</code>)가 <code>count</code> 변수를 만들어요.</li>
      <li>안쪽 함수가 그 <code>count</code>를 계속 사용/수정할 수 있어요.</li>
      <li>바깥 함수를 다시 호출하면, <b>완전히 새로운</b> count가 만들어져요 (서로 영향 없음).</li>
    </ul>
    <div class="tip">💡 팁: 클로저는 "함수가 태어난 곳의 변수를 배낭처럼 메고 다닌다"고 상상하면 이해가 쉬워요.</div>
    <h3>자주 하는 실수</h3>
    <ul>
      <li><code>makeCounter()</code>를 호출할 때마다 <b>완전히 새로운</b> count가 생겨요. "모든 카운터가 같은 count를 공유한다"고 착각하기 쉬운데, 그렇지 않아요.</li>
      <li>바깥 함수가 실행을 끝냈다고 해서 안쪽 변수가 사라지는 게 아니에요. 클로저가 그 변수를 계속 붙잡고 있기 때문이에요.</li>
      <li>반복문 안에서 클로저를 만들 때 <code>var</code>를 쓰면 예상과 다르게 동작할 수 있어요 (모든 클로저가 마지막 값을 공유). <code>let</code>을 쓰면 이 문제가 없어요.</li>
    </ul>
  `,
  code:`function makeCounter() {\n  let count = 0;\n  return function () {\n    count++;\n    return count;\n  };\n}\n\nconst counter1 = makeCounter();\nconsole.log(counter1()); // 1\nconsole.log(counter1()); // 2\nconsole.log(counter1()); // 3\n\nconst counter2 = makeCounter(); // 완전히 새로운 count\nconsole.log(counter2()); // 1 (counter1과 별개!)`,

      starter:`function makeAdder(x) {\n  return function (y) {\n    return x + y;\n  };\n}\n\nconst add5 = makeAdder(5);\n// add5(3)을 출력해보세요\n`,

    <h3>두 가지 핵심 함수</h3>
    <ul>
      <li><code>JSON.stringify(객체)</code> — 객체를 JSON 문자열로 바꿔요. (객체 → 문자)</li>
      <li><code>JSON.parse(문자열)</code> — JSON 문자열을 다시 객체로 바꿔요. (문자 → 객체)</li>
    </ul>
    <p>이 둘은 정확히 반대 방향의 작업이라고 기억하면 헷갈리지 않아요.</p>

    <h3>자주 하는 실수</h3>
    <ul>
      <li><code>JSON.parse</code>에 넣는 문자열의 형식이 조금이라도 틀리면(따옴표 누락 등) 오류가 나요. JSON은 문법이 매우 엄격해요.</li>

{
  title:'비동기 프로그래밍 (Promise) 기초',
  sub:'"기다리는" 작업을 다루는 방법',
  html:`
    <h3>동기 vs 비동기</h3>
    <p>지금까지 배운 코드는 <b>위에서부터 순서대로</b> 한 줄씩 실행됐어요 (동기).
    하지만 서버에서 데이터를 가져오는 작업처럼 <b>시간이 걸리는</b> 일은,
    끝날 때까지 마냥 기다리면 화면이 멈춰버려요.</p>
    <p>그래서 "이 작업은 나중에 끝나면 알려줘, 그동안 다른 코드는 먼저 실행할게"라는
    방식이 필요한데, 이걸 <b>비동기</b>라고 해요.</p>
    <h3>Promise란?</h3>
    <p>Promise는 "나중에 성공하거나 실패할 것을 미리 약속해두는 객체"예요.</p>
    <ul>
      <li><code>.then(결과 => ...)</code> — 성공했을 때 실행할 코드</li>
      <li><code>.catch(에러 => ...)</code> — 실패했을 때 실행할 코드</li>
    </ul>
    <div class="tip">💡 팁: 아래 예제에서 "3번째 줄"이 "시작"보다 늦게 찍히는 걸 확인해보세요. setTimeout은 "잠시 후에 실행해줘"라는 비동기 명령이에요.</div>
    <h3>자주 하는 실수</h3>
    <ul>
      <li><code>.then()</code> 안의 코드가 <b>바로 실행되지 않고</b> 나중에 실행된다는 걸 잊고, 그 아래 코드보다 먼저 실행될 거라 착각하기 쉬워요.</li>
      <li>Promise를 만들기만 하고 <code>.then()</code>이나 <code>await</code>으로 결과를 받지 않으면, 성공/실패 결과를 확인할 방법이 없어요.</li>
      <li><code>.catch()</code>를 안 달아두면, Promise가 실패했을 때 오류가 조용히 무시될 수 있어요. 실패 처리가 필요한 곳엔 꼭 catch를 붙이세요.</li>
    </ul>
  `,
  code:`console.log("1. 시작");\n\nconst promise = new Promise((resolve) => {\n  setTimeout(() => {\n    resolve("서버에서 받은 데이터");\n  }, 100);\n});\n\npromise.then((result) => {\n  console.log("3. 성공:", result);\n});\n\nconsole.log("2. Promise를 걸어두고 일단 다음 코드부터 실행!");`,

      starter:`// Promise.resolve(42)의 결과를 .then으로 출력해보세요\n`,
      hint:'Promise.resolve(42).then(v => console.log(v));',
      check:logs=>logs.some(t=>t.trim()==='42'),
    },
    {
      q:'아래 Promise가 실패(reject)하면 <code>.catch</code>로 <b>"실패"</b>를 출력해보세요.',
      starter:`const p = new Promise((resolve, reject) => {\n  reject("실패");\n});\n\n// .catch로 결과를 출력해보세요\n`,
      hint:'p.catch(e => console.log(e));',
      check:logs=>logs.some(t=>t.includes('실패')),
    },
  ]
},
{
  title:'async / await',
  sub:'Promise를 마치 동기 코드처럼 쉽게 쓰는 법',
  html:`
    <h3>async/await가 편한 이유</h3>
    <p><code>.then()</code>을 계속 이어붙이면 코드가 길어지고 순서를 읽기 힘들어져요.
    <code>async/await</code>를 쓰면 비동기 코드를 <b>위에서 아래로 순서대로 읽히듯</b> 쓸 수 있어요.</p>
    <ul>
      <li><code>async function</code> — 함수 앞에 붙이면, 그 함수 안에서 <code>await</code>을 쓸 수 있어요.</li>
      <li><code>await 프로미스</code> — Promise가 끝날 때까지 "이 줄에서 기다렸다가", 결과값을 바로 받아요.</li>
    </ul>
    <p>겉보기엔 동기 코드처럼 보이지만, 실제로는 여전히 비동기로 동작해요.</p>
    <div class="tip">💡 팁: await은 반드시 async 함수 안에서만 쓸 수 있어요. 최상위(함수 밖)에서 바로 쓰면 오류가 나요.</div>
    <h3>자주 하는 실수</h3>
    <ul>
      <li><code>async</code> 없이 함수에 <code>await</code>만 쓰면 문법 오류가 나요. await을 쓰려면 그 함수 앞에 반드시 <code>async</code>가 있어야 해요.</li>
      <li><code>async function</code>은 항상 <b>Promise를 돌려줘요</b>. 그래서 <code>const r = main();</code>만 하면 r은 결과값이 아니라 Promise 객체예요.</li>
      <li>await으로 실패할 수 있는 작업을 기다릴 땐, <code>try/catch</code>로 감싸는 게 안전해요. await한 Promise가 실패하면 오류가 그 지점에서 던져져요.</li>
    </ul>
  `,
  code:`function getData() {\n  return new Promise((resolve) => {\n    setTimeout(() => resolve("서버 데이터"), 100);\n  });\n}\n\nasync function main() {\n  console.log("1. 데이터 요청 시작");\n  const result = await getData();\n  console.log("2. 받은 데이터:", result);\n  console.log("3. 끝!");\n}\n\nmain();`,

      hint:'const name = await getName(); console.log(name); 을 main 함수 안에 넣으세요.',

      starter:`function getNum() {\n  return Promise.resolve(7);\n}\n\nasync function main() {\n  // await으로 결과를 받아 2배로 출력해보세요\n}\n\nmain();\n`,

      starter:`async function getX() {\n  return 100;\n}\n\nasync function main() {\n  // await으로 getX()의 결과를 출력해보세요\n}\n\nmain();\n`,

{
  title:'재귀함수 (Recursion)',
  sub:'함수가 자기 자신을 호출하는 신기한 방법',
  html:`
    <h3>재귀란?</h3>
    <p>함수 안에서 <b>자기 자신을 다시 호출</b>하는 것을 재귀라고 해요.
    반복문으로 풀 수 있는 문제를 재귀로도 풀 수 있는 경우가 많아요.</p>
    <h3>재귀의 필수 조건: 종료 조건</h3>
    <p>재귀함수는 반드시 "여기서 멈춰야 해"라는 <b>종료 조건(base case)</b>이 있어야 해요.
    종료 조건이 없으면 함수가 무한히 자기 자신을 호출하다가 오류가 나요 (스택 오버플로우).</p>
    <p>예시로 팩토리얼(n!)을 살펴보면:</p>
    <ul>
      <li>종료 조건: <code>n이 1이면 1을 돌려준다</code></li>
      <li>재귀 호출: <code>그렇지 않으면 n * factorial(n-1)을 돌려준다</code></li>
    </ul>
    <div class="tip">💡 팁: 재귀함수를 짤 때는 항상 "① 언제 멈출지" 부터 먼저 정하고, "② 한 단계씩 어떻게 줄여나갈지"를 생각하세요.</div>
    <h3>자주 하는 실수</h3>
    <ul>
      <li>종료 조건(base case)을 빼먹으면 함수가 <b>무한히 자기 자신을 호출</b>하다가 "Maximum call stack size exceeded" 오류가 나요.</li>
      <li>재귀 호출할 때 인자를 <b>줄여나가지 않으면</b> (예: <code>factorial(n)</code>인데 계속 <code>factorial(n)</code>을 호출) 종료 조건에 절대 도달하지 못해요.</li>
      <li>재귀는 편리하지만 반복문보다 느리고 메모리를 더 쓸 수 있어요. 아주 큰 숫자에는 반복문이 더 안전할 때도 많아요.</li>
    </ul>
  `,
  code:`function factorial(n) {\n  if (n <= 1) return 1;       // 종료 조건\n  return n * factorial(n - 1); // 재귀 호출\n}\n\nconsole.log(factorial(5)); // 5*4*3*2*1 = 120\n\nfunction countDown(n) {\n  if (n <= 0) {\n    console.log("발사!");\n    return;\n  }\n  console.log(n);\n  countDown(n - 1);\n}\ncountDown(3);`,
  quizzes:[
    {

  '스프레드 연산자':{q:'배열 <code>[1,2]</code>를 스프레드로 펼쳐서 <code>[1,2,3]</code>을 만들고 출력해보세요.',starter:`const a = [1, 2];\n// 스프레드로 [1,2,3]을 만들어 출력해보세요\n`,hint:'console.log([...a, 3]);',check:l=>l.some(t=>t.includes('1')&&t.includes('2')&&t.includes('3'))},
  '조건문':{q:'<code>temp=30</code>일 때 25보다 크면 <b>"더워요"</b>를 출력하는 if문을 작성해보세요.',starter:`const temp = 30;\n// if문을 작성해보세요\n`,hint:'if(temp>25){ console.log("더워요"); }',check:l=>l.some(t=>t.includes('더워요'))},
  '반복문':{q:'<code>for</code>문으로 1부터 5까지의 합을 구해 출력해보세요. (정답: 15)',starter:`// 1부터 5까지 합을 구해 출력해보세요\n`,hint:'let sum=0; for(let i=1;i<=5;i++){sum+=i;} console.log(sum);',check:l=>l.some(t=>t.trim()==='15')},
  'break':{q:'<code>for</code>문에서 <b>3</b>이 되면 <code>break</code>로 멈추도록 만들고, 멈추기 직전까지의 숫자를 출력해보세요. (1,2 출력)',starter:`// 3이 되면 break로 멈추도록 만들어보세요\n`,hint:'for(let i=1;i<=5;i++){ if(i===3)break; console.log(i); }',check:l=>l.some(t=>t.trim()==='1')&&l.some(t=>t.trim()==='2')&&!l.some(t=>t.trim()==='3')},
  'continue':{q:'1부터 5까지 중 <b>3만 건너뛰고</b> 나머지를 출력해보세요.',starter:`// 3만 건너뛰고 1~5를 출력해보세요\n`,hint:'for(let i=1;i<=5;i++){ if(i===3)continue; console.log(i); }',check:l=>l.some(t=>t.trim()==='4')&&!l.some(t=>t.trim()==='3')},
  '함수':{q:'두 수를 곱해서 돌려주는 함수 <code>multiply(a,b)</code>를 만들고 <code>multiply(3,4)</code>를 출력해보세요.',starter:`function multiply(a, b) {\n\n}\n`,hint:'function multiply(a,b){return a*b;} console.log(multiply(3,4)); → 12',check:l=>l.some(t=>t.trim()==='12')},
  '반환값':{q:'숫자를 받아 그 <b>제곱</b>을 return하는 함수 <code>sq(n)</code>을 만들고 <code>sq(6)</code>을 출력해보세요.',starter:`function sq(n) {\n\n}\n`,hint:'function sq(n){return n*n;} console.log(sq(6)); → 36',check:l=>l.some(t=>t.trim()==='36')},
  '화살표 함수':{q:'화살표 함수로 <code>half</code>(숫자를 반으로 나누는 함수)를 만들고 <code>half(10)</code>을 출력해보세요.',starter:`const half = n => ;\n`,hint:'const half = n => n/2; console.log(half(10)); → 5',check:l=>l.some(t=>t.trim()==='5')},
  '배열':{q:'배열 <code>["국어","영어","수학"]</code>을 만들어 <code>console.log</code>로 통째로 출력해보세요.',starter:`// 배열을 만들어 출력해보세요\n`,hint:'const subjects=["국어","영어","수학"]; console.log(subjects);',check:l=>l.some(t=>t.includes('국어')&&t.includes('영어'))},
  '인덱스':{q:'배열 <code>["a","b","c"]</code>에서 인덱스 <b>1</b>번 값을 출력해보세요.',starter:`const arr = ["a", "b", "c"];\n// 인덱스 1번 값을 출력해보세요\n`,hint:'console.log(arr[1]); → "b"',check:l=>l.some(t=>t.includes('b'))},
  'map':{q:'배열 <code>[1,2,3]</code>의 각 값을 10배로 만들어 출력해보세요.',starter:`const nums = [1, 2, 3];\n// map으로 10배씩 만들어 출력해보세요\n`,hint:'console.log(nums.map(n=>n*10));',check:l=>l.some(t=>t.includes('10')&&t.includes('20')&&t.includes('30'))},
  'filter':{q:'배열 <code>[3,8,12,5,20]</code>에서 <b>10보다 큰 값</b>만 골라 출력해보세요.',starter:`const nums = [3, 8, 12, 5, 20];\n// 10보다 큰 값만 골라 출력해보세요\n`,hint:'console.log(nums.filter(n=>n>10));',check:l=>l.some(t=>t.includes('12')&&t.includes('20'))},
  'forEach':{q:'배열 <code>["a","b","c"]</code>을 <code>forEach</code>로 하나씩 출력해보세요.',starter:`const arr = ["a", "b", "c"];\n// forEach로 하나씩 출력해보세요\n`,hint:'arr.forEach(v=>console.log(v));',check:l=>l.some(t=>t.includes('a'))&&l.some(t=>t.includes('b'))&&l.some(t=>t.includes('c'))},
  '구조분해할당':{q:'배열 <code>[10,20]</code>을 구조분해할당으로 <code>a, b</code>에 담아 <code>a+b</code>를 출력해보세요.',starter:`const [a, b] = [10, 20];\n// a+b를 출력해보세요\n`,hint:'console.log(a+b); → 30',check:l=>l.some(t=>t.trim()==='30')},
  '객체':{q:'객체 <code>{name:"밥", price:8000}</code>을 만들어 <code>price</code>를 출력해보세요.',starter:`// 객체를 만들고 price를 출력해보세요\n`,hint:'const menu={name:"밥",price:8000}; console.log(menu.price);',check:l=>l.some(t=>t.trim()==='8000')},
  '속성':{q:'객체 <code>{color:"빨강"}</code>에서 <code>color</code> 속성 값을 출력해보세요.',starter:`const item = { color: "빨강" };\n// color 속성을 출력해보세요\n`,hint:'console.log(item.color);',check:l=>l.some(t=>t.includes('빨강'))},
  '메서드':{q:'문자열 <code>"hello"</code>에 <code>.toUpperCase()</code> 메서드를 적용해서 출력해보세요.',starter:`const s = "hello";\n// toUpperCase()를 적용해서 출력해보세요\n`,hint:'console.log(s.toUpperCase()); → "HELLO"',check:l=>l.some(t=>t.includes('HELLO'))},
  '클래스':{q:'<code>Book</code> 클래스를 만들어 <code>title</code>을 저장하고, <code>new Book("코딩책")</code>으로 만든 뒤 <code>.title</code>을 출력해보세요.',starter:`class Book {\n  constructor(title) {\n    this.title = title;\n  }\n}\n// Book 객체를 만들고 title을 출력해보세요\n`,hint:'const b=new Book("코딩책"); console.log(b.title);',check:l=>l.some(t=>t.includes('코딩책'))},
  '생성자':{q:'<code>Box</code> 클래스의 생성자에서 <code>size</code>를 받아 저장하고, <code>new Box(5).size</code>를 출력해보세요.',starter:`class Box {\n  constructor(size) {\n\n  }\n}\n`,hint:'this.size=size; 를 constructor 안에 넣고 console.log(new Box(5).size); → 5',check:l=>l.some(t=>t.trim()==='5')},
  '예외 처리':{q:'<code>notExist()</code>를 <code>try/catch</code>로 감싸서 에러가 나도 <b>"괜찮아요"</b>가 출력되게 해보세요.',starter:`// try/catch로 감싸보세요\nnotExist();\n`,hint:'try{notExist();}catch(e){console.log("괜찮아요");}',check:l=>l.some(t=>t.includes('괜찮아요'))},
};
function exBtn(term){ return EX[term]?`<button class="btn exBtn" data-term="${term}" style="margin-top:8px;font-size:11.5px;padding:5px 10px">✏️ 이 용어로 연습문제 풀기</button>`:''; }

// ── 용어 클릭 시 보여줄 자세한 설명 ──
const DETAIL={
  '코딩 / 프로그래밍':'컴퓨터는 사람 말을 못 알아듣기 때문에, 정해진 규칙(문법)에 맞춰 "무엇을, 어떤 순서로 할지" 적어주는 작업을 말해요. 요리 레시피처럼 순서와 조건이 명확해야 컴퓨터가 실수 없이 실행할 수 있어요.',
  '변수':'변수는 이름표가 붙은 상자예요. <code>let</code>은 나중에 값을 바꿀 수 있고, <code>const</code>는 한 번 정하면 못 바꿔요. 예: <code>let score=80; score=90;</code>은 가능하지만 <code>const</code>로 하면 오류가 나요.',
  '상수':'값이 절대 바뀌지 않아야 할 때 <code>const</code>를 씁니다. 실수로 값을 덮어쓰는 버그를 막아주기 때문에, 바뀔 필요가 없다면 항상 const를 먼저 고려하는 게 좋아요.',
  '자료형':'값마다 성격이 달라서 컴퓨터가 종류를 구분해요. 숫자는 계산에, 문자열은 글자 표시에, 불리언은 참/거짓 판단에 쓰입니다. <code>typeof 값</code>으로 현재 자료형을 확인할 수 있어요.',
  '문자열':'따옴표(큰따옴표 또는 작은따옴표)로 감싼 글자 모음이에요. <code>"5"+"3"</code>은 숫자 8이 아니라 문자 "53"이 되는 점을 주의하세요 — 문자열끼리 +는 "이어붙이기"예요.',
  '불리언':'true 또는 false 딱 두 값만 가져요. <code>if</code>문의 조건 자리에는 항상 불리언 값(또는 불리언으로 평가되는 식)이 들어갑니다.',
  'undefined':'변수를 선언만 하고 값을 아직 안 넣었을 때 자동으로 들어가는 값이에요. "깜빡하고 안 채움"에 가깝습니다.',
  'null':'개발자가 "여기엔 지금 값이 없다"는 걸 일부러 표시하려고 넣는 값이에요. undefined와 달리 의도적으로 넣는다는 차이가 있어요.',
  '조건문':'조건이 참이면 if 블록, 거짓이면 else 블록이 실행돼요. else if를 이어서 여러 상황을 순서대로 검사할 수 있고, 위에서부터 조건을 검사해 먼저 맞는 것만 실행합니다.',
  '반복문':'같은 코드를 여러 번 실행할 때 써요. for문은 반복 횟수가 정해져 있을 때, while문은 "조건이 참인 동안" 반복할 때 주로 사용해요. 조건을 잘못 쓰면 무한 루프에 빠질 수 있으니 주의하세요.',
  '함수':'같은 코드를 여러 번 복사하지 않고 이름 붙여 재사용하는 방법이에요. 매개변수로 값을 받아 처리하고, return으로 결과를 돌려줘요. 함수를 쓰면 코드가 짧아지고 수정할 곳이 한 군데로 줄어들어요.',
  '매개변수':'함수를 정의할 때 "이런 값을 받을 거야"라고 정해두는 자리예요. <code>function add(a,b)</code>에서 a, b가 매개변수입니다.',
  '인자':'함수를 실제로 호출할 때 넣어주는 값이에요. <code>add(3,4)</code>에서 3, 4가 인자입니다. 매개변수는 "받는 자리", 인자는 "실제로 주는 값"이라고 구분하면 헷갈리지 않아요.',
  '반환값':'함수가 일을 끝내고 결과로 돌려주는 값이에요. return이 없으면 함수는 undefined를 돌려줘요. return을 만나는 순간 함수는 즉시 종료돼요.',
  '배열':'순서가 있는 값들의 목록이에요. 인덱스(0부터 시작하는 번호)로 각 값에 접근해요. 목록/장바구니처럼 "같은 종류의 여러 개"를 다룰 때 배열을 씁니다.',
  '인덱스':'배열에서 값의 위치를 나타내는 번호예요. 첫 번째 값이 0번, 두 번째가 1번이라는 점을 꼭 기억하세요 — 처음 배우는 사람이 가장 많이 실수하는 부분이에요.',
  '객체':'배열이 "순서"로 값을 구분한다면 객체는 "이름(key)"으로 값을 구분해요. 학생 한 명의 이름·나이·점수처럼 서로 다른 종류의 정보를 하나로 묶을 때 유용해요.',
  '속성':'객체 안에 들어있는 key: value 한 쌍을 말해요. <code>obj.속성명</code>으로 꺼내 쓰거나 <code>obj.속성명 = 새값</code>으로 바꿀 수 있어요.',
  '메서드':'객체나 배열이 자체적으로 가지고 있는 함수예요. <code>arr.push()</code>, <code>str.slice()</code>처럼 값 뒤에 점(.)을 찍고 호출해요.',
  'map':'배열의 모든 값을 원하는 형태로 바꿔서 "새 배열"을 만들어요. 원본 배열은 바뀌지 않아요. 예: 가격 목록에 10% 할인을 일괄 적용할 때 유용해요.',
  'filter':'배열에서 조건에 맞는 값만 골라 "새 배열"을 만들어요. 합격자만 골라내기, 재고가 있는 상품만 남기기 같은 상황에 자주 써요.',
  'find':'조건에 맞는 첫 번째 값 "하나만" 찾아줘요. filter와 달리 배열이 아니라 값 하나(또는 없으면 undefined)를 돌려줘요.',
  '클래스':'비슷한 객체를 여러 개 찍어내는 설계도예요. "학생"이라는 클래스를 한 번 만들어두면, 이름과 점수만 다른 학생 객체를 new로 계속 만들어낼 수 있어요.',
  '생성자':'클래스로 객체를 새로 만들 때(new) 가장 먼저, 자동으로 실행되는 함수예요. 보통 여기서 초기값을 this에 저장해요.',
  'this':'클래스나 객체의 메서드 안에서 "지금 이 메서드를 호출한 객체 자신"을 가리켜요. 같은 클래스로 만든 객체마다 this가 각자 다른 대상을 가리킨다는 게 핵심이에요.',
  '인스턴스':'클래스라는 설계도로 실제로 찍어낸 객체 하나하나를 말해요. 학생 클래스로 "철수", "영희" 객체를 만들면 둘 다 Student 클래스의 인스턴스예요.',
  '연산자':'값을 계산하거나 비교, 결합하는 기호예요. 산술(+ - * /), 비교(=== >), 논리(&& ||) 등 역할별로 나뉘어요.',
  '비교 연산자':'<code>===</code>는 값과 자료형까지 정확히 같아야 true예요. <code>==</code>는 자료형이 달라도 대충 맞으면 true가 나와 예상치 못한 버그를 만들 수 있어서, 실무에서는 항상 <code>===</code>를 권장해요.',
  '논리 연산자':'<code>&&</code>는 둘 다 참이어야 true, <code>||</code>는 하나만 참이어도 true, <code>!</code>는 참/거짓을 뒤집어요. 여러 조건을 하나의 if문에 합칠 때 자주 써요.',
  '삼항연산자':'<code>조건 ? A : B</code> 형태로 짧은 if/else를 한 줄에 써요. 조건이 참이면 A, 거짓이면 B가 결과가 돼요. 간단한 분기에는 좋지만 너무 복잡한 조건에는 오히려 가독성이 떨어질 수 있어요.',
  '나머지 연산자':'<code>%</code>는 나눗셈을 하고 남은 나머지를 구해요. <code>n % 2 === 0</code>이면 짝수라는 뜻이라 짝수/홀수 판별에 정말 자주 쓰여요.',
  '예외 처리':'try 블록 안 코드가 실행되다 오류가 나면, 프로그램이 멈추는 대신 catch 블록이 대신 실행돼요. 사용자 입력처럼 실패할 가능성이 있는 코드를 감쌀 때 유용해요.',
  '버그':'프로그램이 의도한 대로 동작하지 않는 모든 문제를 버그라고 불러요. 오타부터 논리 실수까지 다양한 원인이 있을 수 있어요.',

function findKeyterm(text){
  for(const [pattern,detail] of KEYTERMS){
    if(text.includes(pattern))return {pattern,detail};
  }
  return null;
}
function annotateKeyterms(container){
  container.querySelectorAll('code').forEach(el=>{
    const found=findKeyterm(el.textContent);
    if(found){ el.classList.add('kterm'); el.dataset.kterm=found.pattern; }
  });
}
function showKDetail(pattern){
  const found=KEYTERMS.find(k=>k[0]===pattern);
  if(!found)return;
  let panel=document.getElementById('kdetailPanel');
  if(!panel){
    panel=document.createElement('div');
    panel.id='kdetailPanel';
    document.getElementById('explain').appendChild(panel);
  }
  panel.innerHTML=`<div class="kh">🔍 <code>${pattern}</code> 이게 뭐예요?</div><div class="kb">${found[1]}</div>`;
  panel.classList.add('show');
  panel.scrollIntoView({behavior:'smooth',block:'nearest'});
}
document.getElementById('explain').addEventListener('click',e=>{
  const el=e.target.closest('.kterm');
  if(el)showKDetail(el.dataset.kterm);
});

// 레슨은 quizzes(배열) 또는 예전 방식인 quiz(단일 객체)를 가질 수 있어요
function getQuizzes(l){
  return l.quizzes || (l.quiz ? [l.quiz] : []);
}

function quizBlockHTML(list, idx){
  if(!list || list.length===0)return '';
  const quiz=list[idx];
  const multi=list.length>1;
  const navHtml=multi?`<div class="qnav">
    <button class="btn" id="quizPrev" ${idx===0?'disabled':''} style="font-size:11px;padding:4px 10px">◀ 이전 문제</button>
    <span class="qind">문제 ${idx+1} / ${list.length}</span>
    <button class="btn" id="quizNext" ${idx===list.length-1?'disabled':''} style="font-size:11px;padding:4px 10px">다음 문제 ▶</button>
  </div>`:'';
  return `<div class="quiz">
    <div class="qh">🧠 문제를 풀어보세요</div>
    ${navHtml}
    <div class="qb">${quiz.q}</div>
    <button class="btn" id="quizStartBtn" style="margin-top:10px">📝 이 문제로 편집기 초기화</button>
    <div class="qhint" id="hintToggle">힌트 보기 ▾</div>
    <div class="qhintbody" id="hintBody">${quiz.hint}</div>
  </div>`;
}

// 레슨 설명(html)을 <h3> 단위로 쪼개서 한 번에 하나씩 보여주기 위한 함수
function splitSteps(html){
  return html.split(/(?=<h3[ >])/).map(s=>s.trim()).filter(s=>s);
}

let currentQuiz=null;
let currentQuizList=[];
let quizIdx=0;
let lessonSteps=[];
let lessonStep=0;

function renderStep(){
  const l=LESSONS[cur];
  const steps=lessonSteps;
  const isLast=lessonStep===steps.length-1;
  const dots=steps.map((_,idx)=>`<span class="dot${idx===lessonStep?' on':''}"></span>`).join('');
  const nav=`<div id="stepnav">
    <button class="stepbtn" id="stepPrev" ${lessonStep===0?'disabled':''}>◀ 이전 설명</button>
    <div class="stepind">STEP ${lessonStep+1} / ${steps.length}<div class="dots">${dots}</div></div>
    <button class="stepbtn" id="stepNext" ${isLast?'disabled':''}>다음 설명 ▶</button>
  </div>`;
  document.getElementById('explain').innerHTML=nav+steps[lessonStep]+(isLast?quizBlockHTML(currentQuizList, quizIdx):'');
  annotateKeyterms(document.getElementById('explain'));

  document.getElementById('stepPrev').onclick=()=>{ if(lessonStep>0){ lessonStep--; renderStep(); } };
  document.getElementById('stepNext').onclick=()=>{ if(lessonStep<steps.length-1){ lessonStep++; renderStep(); } };

  const qPrev=document.getElementById('quizPrev');
  if(qPrev)qPrev.onclick=()=>{ if(quizIdx>0){ quizIdx--; currentQuiz=currentQuizList[quizIdx]; clearGrade(); renderStep(); } };
  const qNext=document.getElementById('quizNext');
  if(qNext)qNext.onclick=()=>{ if(quizIdx<currentQuizList.length-1){ quizIdx++; currentQuiz=currentQuizList[quizIdx]; clearGrade(); renderStep(); } };

  const startBtn=document.getElementById('quizStartBtn');
  if(startBtn)startBtn.onclick=()=>{ document.getElementById('editor').value=currentQuizList[quizIdx].starter; document.getElementById('editor').focus(); };
  const hintToggle=document.getElementById('hintToggle');
  if(hintToggle)hintToggle.onclick=()=>document.getElementById('hintBody').classList.toggle('show');
}

function clearGrade(){
  document.getElementById('gradeResult').className='';
  document.getElementById('gradeResult').textContent='';
}

function goto(i){
  practicing=false;
  document.getElementById('prevBtn').style.display='';
  cur=i;
  const l=LESSONS[i];
  currentQuizList=getQuizzes(l);
  quizIdx=0;
  currentQuiz=currentQuizList[0]||null;
  lessonSteps=splitSteps(l.html);
  lessonStep=0;
  document.getElementById('hTitle').textContent=(i+1)+'. '+l.title;
  document.getElementById('hSub').textContent=l.sub;
  renderStep();
  document.getElementById('editor').value=l.code;
  document.getElementById('output').innerHTML='<div class="ph line">// 실행 결과가 여기 표시됩니다</div>';
  clearGrade();
  [...listEl.children].forEach(el=>el.classList.toggle('active',+el.dataset.i===i));
  document.getElementById('prevBtn').disabled=i===0;
  document.getElementById('nextBtn').textContent=(i===LESSONS.length-1)?'처음으로 ↺':'다음 레슨 →';
}

let lastLogs=[];
let lastRawLogs=[];
// Promise/async 코드는 console.log가 마이크로태스크(또는 setTimeout)로 나중에 실행되므로,
// fn() 호출 직후가 아니라 잠시 기다렸다가 결과를 모아서 보여주고 채점해요.
function runCode(cb){
  const out=document.getElementById('output');
  out.innerHTML='<div class="ph line">// 실행 중...</div>';
  const logs=[];
  const fakeConsole={
    log:(...args)=>logs.push({t:args.map(a=>typeof a==='object'?JSON.stringify(a):String(a)).join(' '),err:false}),
    error:(...args)=>logs.push({t:args.map(a=>String(a)).join(' '),err:true}),
  };
  try{
    const fn=new Function('console', document.getElementById('editor').value);
    fn(fakeConsole);
  }catch(e){
    logs.push({t:'⚠️ 오류: '+e.message, err:true});
  }
  setTimeout(()=>{
    lastRawLogs=logs;
    lastLogs=logs.filter(l=>!l.err).map(l=>l.t);
    if(logs.length===0){ out.innerHTML='<div class="ph line">// 출력된 내용이 없습니다 (console.log를 사용해보세요)</div>'; }
    else{
      out.innerHTML='';
      logs.forEach(l=>{
        const d=document.createElement('div');
        d.className='line'+(l.err?' err':'');
        d.textContent=l.t;
        out.appendChild(d);
      });
    }
    if(cb)cb();
  },200);
}

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

function diagnoseFailure(){
  const errLog=lastRawLogs.find(l=>l.err);
  if(errLog){
    return `🔍 코드 실행 중 오류가 발생했어요:<br><code>${escapeHtml(errLog.t)}</code><br>오류 메시지에 나온 위치(변수명/문법)를 다시 확인해보세요.`;
  }
  if(lastLogs.length===0){
    return '🔍 <code>console.log</code>로 출력된 내용이 하나도 없어요. 문제에서 요구하는 값을 console.log로 출력했는지 확인해보세요.';
  }
  return `🔍 실행은 됐지만 원하는 결과가 아니에요.<br>지금 출력된 값: <code>${escapeHtml(lastLogs.join(' / '))}</code><br>문제가 요구하는 값과 비교해보고, 힌트를 참고해서 다시 시도해보세요.`;
}

function checkAnswer(){
  const res=document.getElementById('gradeResult');
  res.className='';
  res.textContent='';
  runCode(()=>{
    const quiz=currentQuiz;
    if(!quiz){ return; }
    const pass=quiz.check(lastLogs);
    if(examMode){ examResults[examIndex]=pass; }
    res.className=pass?'ok':'no';
    res.innerHTML=pass
      ?'🎉 정답이에요!'+(examMode?' "다음 문제"를 눌러 계속하세요.':' 다음 단계로 넘어가도 좋아요.')
      :'❌ 아직이에요.<br>'+diagnoseFailure()+(examMode?'<br><br>시험에서는 틀려도 "다음 문제"로 넘어갈 수 있어요. (마지막 채점 결과가 점수에 반영돼요)':'');
  });
}

const FAQ=[
  {kw:['시작','어떻게 배워','처음','뭐부터'],a:'왼쪽 레슨 목록의 1번부터 순서대로 따라가 보세요. 각 레슨은 설명 → 예제 코드 실행 → 연습문제 순서로 되어 있어서, 순서대로만 따라가면 자연스럽게 익혀져요.'},
  {kw:['오류','에러','안 돼','안돼','실행이 안'],a:'대부분의 오류는 <code>따옴표를 안 닫았거나</code>, <code>괄호 짝이 안 맞거나</code>, <code>세미콜론/콤마를 빼먹은 경우</code>예요. 오류 메시지에 나온 줄 번호 근처를 다시 살펴보세요. 각 레슨의 "자주 하는 실수" 부분도 참고해보세요.'},
  {kw:['채점','틀렸','통과가 안'],a:'채점하기 버튼은 여러분의 코드를 실행한 뒤, console.log로 출력한 내용이 문제에서 원하는 조건과 맞는지 확인해요. 힌트를 눌러서 정답에 가까운 코드 형태를 참고해보세요.'},
  {kw:['시험','exam'],a:'왼쪽 목록 아래 "🧪 시험 보기" 버튼을 누르면, 원하는 레슨 범위를 골라서 그 안의 연습문제로 실전 시험을 볼 수 있어요.'},
  {kw:['용어 사전','용어사전'],a:'왼쪽 목록 아래 "📖 용어 사전 전체보기"를 누르면 이 앱에서 쓰는 모든 용어를 검색하고 볼 수 있어요.'},
  {kw:['자바스크립트가 뭐','js가 뭐'],a:'자바스크립트(JavaScript)는 웹사이트를 동적으로 움직이게 만드는 코딩 언어예요. 이 앱의 모든 예제와 채점도 자바스크립트로 동작해요.'},
];
const ASK_PARTICLES=['인가요','일까요','일가요','이에요','이란','에게는','에서는','에게','에서','에는','에도','으로','로는','한테','이랑','란','은','는','이','가','을','를','로','와','과','도','만','까지','부터','인가','일까','예요','에요','에','랑','죠','나요'];
function normalizeAsk(s){ return (s||'').toLowerCase().replace(/[?!.,~\s]+/g,' ').trim(); }
// 질문 문장에서 조사/어미를 최대한 떼어내 핵심 명사만 남긴 토큰들을 만든다
function askTokens(q){
  return q.split(/\s+/).filter(Boolean).map(w=>{
    let base=w;
    for(const p of ASK_PARTICLES){ if(base.length>p.length+1 && base.endsWith(p)){ base=base.slice(0,-p.length); break; } }
    return base;
  });
}
function findGlossaryMatch(q){
  const qWords=askTokens(q).filter(w=>w.length>=2);
  const candidates=[];
  GLOSSARY.forEach(group=>group.items.forEach(g=>{
    let score=0, directPos=-1;
    const terms=g.t.toLowerCase().split(/[\/,]/).map(s=>s.trim()).filter(Boolean);
    // 용어 자체가 질문 안에 정확히(단어 경계로, 여러 단어짜리 용어는 부분일치로) 등장하면 강한 신호
    terms.forEach(t=>{
      if(t.length<2) return;
      const hit=t.includes(' ')?q.includes(t):qWords.some(w=>w===t);
      if(hit){ score+=6; const p=q.indexOf(t); if(directPos===-1||(p>=0&&p<directPos)) directPos=p; }
    });
    if(g.c && g.c.length>=2 && q.includes(g.c.toLowerCase())){
      score+=6;
      const p=q.indexOf(g.c.toLowerCase());
      if(directPos===-1||(p>=0&&p<directPos)) directPos=p;
    }
    // 정의(definition) 문장과 핵심 단어가 2개 이상 겹칠 때만 보조 신호로 반영
    const defWords=g.d.toLowerCase().replace(/[.,()]/g,'').split(/\s+/).filter(w=>w.length>=3);
    const overlap=defWords.filter(w=>qWords.includes(w)).length;
    if(overlap>=2) score+=overlap*2;
    if(score>=4) candidates.push({item:g,score,directPos,direct:directPos>=0});
  }));
  if(candidates.length===0) return null;
  // 질문 속에 등장한 순서대로 여러 용어를 함께 다룬 질문이면, 명확히 매치된(direct) 용어를 모두 반환
  // 단, "코딩에서 ~" 처럼 그냥 배경으로 언급된 범용 용어는 다른 구체적인 용어가 있으면 제외한다
  const ASK_GENERIC_TERMS=new Set(['코딩 / 프로그래밍','프로그램']);
  let directHits=candidates.filter(c=>c.direct);
  if(directHits.length>=2 && directHits.some(c=>!ASK_GENERIC_TERMS.has(c.item.t))){
    directHits=directHits.filter(c=>!ASK_GENERIC_TERMS.has(c.item.t));
  }
  if(directHits.length>=2){
    directHits.sort((a,b)=>a.directPos-b.directPos);
    const top=directHits.slice(0,3);
    return {multi:true,items:top.map(c=>c.item),score:Math.max(...top.map(c=>c.score))};
  }
  if(directHits.length===1) return {item:directHits[0].item,score:directHits[0].score};
  candidates.sort((a,b)=>b.score-a.score);
  return {item:candidates[0].item,score:candidates[0].score};
}
function findFaqMatch(q){
  let best=null,bestScore=0;
  FAQ.forEach(f=>{
    let score=0;
    f.kw.forEach(k=>{ if(q.includes(k.toLowerCase())) score+=8; });
    if(score>bestScore){ bestScore=score; best=f; }
  });
  return bestScore>0?{item:best,score:bestScore}:null;
}
function answerAsk(raw){
  const q=normalizeAsk(raw);
  if(!q) return null;
  const faqMatch=findFaqMatch(q);
  const glossMatch=findGlossaryMatch(q);
  if(faqMatch && (!glossMatch || faqMatch.score>=glossMatch.score)){
    return {html:faqMatch.item.a, miss:false};
  }
  if(glossMatch && glossMatch.multi){
    const html=glossMatch.items.map(g=>{
      const detail=DETAIL[g.t];
      return `<div class="aterm">${g.t} <span style="color:var(--dim);font-weight:400">(${g.c})</span></div>${detail||g.d}`;
    }).join('<div style="margin-top:10px;padding-top:10px;border-top:1px dashed var(--line)"></div>');
    return {html, miss:false};
  }
  if(glossMatch){
    const g=glossMatch.item;
    const detail=DETAIL[g.t];
    return {html:`<div class="aterm">${g.t} <span style="color:var(--dim);font-weight:400">(${g.c})</span></div>${detail||g.d}`, miss:false};
  }
  return {html:'음, 정확히 아는 내용이 아니에요 🙏 다른 말로 다시 물어보시거나, "📖 용어 사전"에서 관련 단어를 검색해보세요.', miss:true};
}
function askSubmitHandler(){
  const input=document.getElementById('askInput');
  const text=input.value.trim();
  if(!text)return;
  const log=document.getElementById('askLog');
  log.insertAdjacentHTML('beforeend', `<div class="askQ">${text.replace(/</g,'&lt;')}</div>`);
  const res=answerAsk(text);
  log.insertAdjacentHTML('beforeend', `<div class="askA${res.miss?' miss':''}">${res.html}</div>`);
  log.scrollTop=log.scrollHeight;
  input.value='';
  input.focus();
}

function shuffle(arr){
  const a=arr.slice();
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

  const list=document.getElementById('examLessonList');
  list.innerHTML=LESSONS.map((l,i)=>{
    const n=getQuizzes(l).length;

  }).join('');
  list.querySelectorAll('input[type=checkbox]').forEach(cb=>cb.addEventListener('change',updateExamStartBar));
  updateExamStartBar();
}

function startExam(){
  const checked=[...document.querySelectorAll('#examLessonList input:checked')].map(cb=>+cb.dataset.i);
  if(checked.length===0)return;
  examSelectedIndices=checked;
  buildAndRunExam();
}

function buildAndRunExam(){
  const pool=[];
  examSelectedIndices.forEach(i=>{
    const l=LESSONS[i];
    getQuizzes(l).forEach(q=>pool.push({lessonTitle:l.title, quiz:q}));
  });
  examQuestions=shuffle(pool);
  examIndex=0;
  examResults=new Array(examQuestions.length).fill(false);
  examMode=true;
  document.getElementById('examSetupView').classList.remove('show');
  document.getElementById('examResultView').classList.remove('show');
  document.getElementById('content').style.display='';
  document.getElementById('navBtns').style.display='';
  showExamQuestion();
}

function showExamQuestion(){
  const eq=examQuestions[examIndex];
  currentQuizList=[eq.quiz];
  quizIdx=0;
  currentQuiz=eq.quiz;
  document.getElementById('hTitle').textContent=`🧪 시험 문제 ${examIndex+1} / ${examQuestions.length}`;
  document.getElementById('hSub').textContent='['+eq.lessonTitle+'] 관련 문제예요';
  document.getElementById('explain').innerHTML=quizBlockHTML(currentQuizList, 0);
  annotateKeyterms(document.getElementById('explain'));
  document.getElementById('editor').value=eq.quiz.starter;
  document.getElementById('output').innerHTML='<div class="ph line">// 실행 결과가 여기 표시됩니다</div>';
  clearGrade();
  const startBtn=document.getElementById('quizStartBtn');
  if(startBtn)startBtn.onclick=()=>{ document.getElementById('editor').value=eq.quiz.starter; document.getElementById('editor').focus(); };
  const hintToggle=document.getElementById('hintToggle');
  if(hintToggle)hintToggle.onclick=()=>document.getElementById('hintBody').classList.toggle('show');
  document.getElementById('prevBtn').style.display='none';
  document.getElementById('nextBtn').textContent=(examIndex===examQuestions.length-1)?'🏁 시험 종료 & 결과보기':'다음 문제 →';
}

function finishExam(){
  const score=examResults.filter(Boolean).length;
  const total=examQuestions.length;
  const pct=Math.round(score/total*100);
  document.getElementById('content').style.display='none';
  document.getElementById('navBtns').style.display='none';
  document.getElementById('examResultView').classList.add('show');
  document.getElementById('hTitle').textContent='🧪 시험 결과';
  document.getElementById('hSub').textContent='';
  const reviewHtml=examQuestions.map((eq,i)=>{
    const ok=examResults[i];
    return `<div class="ereview ${ok?'right':'wrong'}">
      <div class="erhead">${ok?'✅ 정답':'❌ 오답'} · [${eq.lessonTitle}]</div>
      <div class="erq">${eq.quiz.q}</div>
    </div>`;
  }).join('');
  document.getElementById('examResultBody').innerHTML=`
    <h2>${pct}점</h2>
    <div class="escore">${total}문제 중 ${score}문제 정답</div>
    ${reviewHtml}
  `;
  examMode=false;
}
