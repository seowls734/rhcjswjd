<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>TACTICAL SURVIVAL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{overflow:hidden;background:#000;font-family:'Courier New',monospace}
#ui{position:absolute;top:18px;left:18px;color:#e0e0e0;z-index:10;pointer-events:none;text-shadow:1px 1px 6px #000;user-select:none}
.label{font-size:11px;letter-spacing:2px;color:#aaa;margin-bottom:3px}
.bar-wrap{width:220px;height:14px;background:rgba(255,0,0,0.2);border:1px solid rgba(255,80,80,0.5);margin-bottom:14px}
#hp-bar{height:100%;background:linear-gradient(90deg,#c0392b,#e74c3c);transition:width 0.1s}
#score-text{font-size:20px;font-weight:bold;margin-bottom:6px}
#weapon-text{font-size:16px;color:#7ecfff;margin-bottom:3px}
#ammo-text{font-size:14px;margin-bottom:4px}
#reload-text{font-size:13px;color:#7ec8ff;min-height:18px}
#dmg-text{font-size:13px;color:#ffaa44;min-height:18px}
#ehp-text{font-size:11px;color:#ff9966;min-height:16px}
#weapon-bar{position:absolute;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:4px;z-index:10;pointer-events:none}
.wslot{width:60px;height:50px;background:rgba(0,0,0,0.65);border:1px solid rgba(255,255,255,0.12);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#888;font-size:9px;transition:all 0.12s}
.wslot.active{background:rgba(30,100,180,0.4);border-color:rgba(80,180,255,0.7);color:#fff}
.wslot .wk{font-size:9px;color:#555;margin-bottom:2px}
.wslot.active .wk{color:#7ecfff}
.wslot .wn{font-size:8px;text-align:center;line-height:1.3}
#crosshair{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;pointer-events:none}
#crosshair::before,#crosshair::after{content:'';position:absolute;background:rgba(0,255,100,0.9);transition:all 0.08s}
#crosshair::before{width:2px;height:16px;top:-8px;left:-1px}
#crosshair::after{width:16px;height:2px;left:-8px;top:-1px}
#crosshair.ads::before{height:6px;top:-3px}
#crosshair.ads::after{width:6px;left:-3px}
#crosshair .dot{position:absolute;width:3px;height:3px;background:rgba(0,255,100,0.95);border-radius:50%;top:-1.5px;left:-1.5px}
#instructions{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.93);color:#fff;padding:36px 48px;text-align:center;border:1px solid rgba(0,255,100,0.35);cursor:pointer;z-index:20;min-width:460px}
#instructions h1{font-size:28px;letter-spacing:6px;color:#00ff88;margin-bottom:14px}
#instructions p{color:#bbb;margin:6px 0;font-size:13px;line-height:1.8}
.hint{color:#555;font-size:11px;margin-top:16px}
#hit-flash{position:absolute;inset:0;background:rgba(255,0,0,0);pointer-events:none;z-index:8;transition:background 0.1s}
#fire-flash{position:absolute;inset:0;background:rgba(255,255,255,0);pointer-events:none;z-index:8;transition:background 0.06s}
</style>
</head>
<body>

<div id="ui">
  <div class="label">SURVIVOR HP</div>
  <div class="bar-wrap"><div id="hp-bar"></div></div>
  <div id="score-text">SCORE: <span id="score">0</span></div>
  <div id="weapon-text">WEAPON: <span id="wname">PISTOL</span></div>
  <div id="ammo-text">AMMO: <span id="ammo">15</span> / <span id="maxammo">15</span></div>
  <div id="reload-text"></div>
  <div id="dmg-text"></div>
  <div id="ehp-text"></div>
</div>

<div id="crosshair"><div class="dot"></div></div>
<div id="weapon-bar"></div>
<div id="hit-flash"></div>
<div id="fire-flash"></div>

<div id="instructions">
  <h1>TACTICAL SURVIVAL</h1>
  <p>클릭하여 전투 시작</p>
  <p>W A S D 이동 &nbsp;|&nbsp; SPACE 점프 &nbsp;|&nbsp; 좌클릭 사격 &nbsp;|&nbsp; 우클릭 조준 &nbsp;|&nbsp; R 재장전</p>
  <p>1~0 &nbsp;/&nbsp; Q &nbsp;/&nbsp; E &nbsp;&nbsp; 무기 선택 (12종)</p>
  <div class="hint">12종 무기 · 적 체력바 · 총기 반동 · 벽 슬라이딩</div>
</div>

<script type="importmap">
{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}
</script>
<script type="module">
import * as THREE from 'three';
import { PointerLockControls } from 'three/addons/controls/PointerLockControls.js';

// ── SCENE ──────────────────────────────────────────────────────
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x080c11);
scene.fog = new THREE.Fog(0x080c11, 30, 240);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.01, 1500);
camera.position.set(0, 1.7, 60);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0x606878, 2.2));
const dirL = new THREE.DirectionalLight(0xffffff, 1.8);
dirL.position.set(20,35,10); dirL.castShadow=true; dirL.shadow.mapSize.set(2048,2048); scene.add(dirL);
scene.add(Object.assign(new THREE.PointLight(0x3366ff,12,100,2),{position:{x:55,y:8,z:-20}}));
scene.add(Object.assign(new THREE.PointLight(0xff4422,12,100,2),{position:{x:-45,y:8,z:35}}));

// ── CONTROLS ───────────────────────────────────────────────────
const ctrl = new PointerLockControls(camera, document.body);
scene.add(ctrl.getObject());

// ── GUN GROUP ──────────────────────────────────────────────────
const gunGrp = new THREE.Group();
camera.add(gunGrp);
gunGrp.position.set(0.24, -0.24, -0.50);
let gunModel = null;
let gunKickZ = 0, gunKickRX = 0;

// ── UI ─────────────────────────────────────────────────────────
const hpBar   = document.getElementById('hp-bar');
const scoreEl = document.getElementById('score');
const ammoEl  = document.getElementById('ammo');
const maxAmEl = document.getElementById('maxammo');
const rldTxt  = document.getElementById('reload-text');
const dmgTxt  = document.getElementById('dmg-text');
const ehpTxt  = document.getElementById('ehp-text');
const instrEl = document.getElementById('instructions');
const wnameEl = document.getElementById('wname');
const wbarEl  = document.getElementById('weapon-bar');
const hitFl   = document.getElementById('hit-flash');
const fireFl  = document.getElementById('fire-flash');
const xhEl    = document.getElementById('crosshair');

// ── WEAPON DATA ────────────────────────────────────────────────
const WD = {
  pistol:  {n:'PISTOL',        k:'1', mag:15,  rld:1.3, spd:50,  dmg:1.0,  spr:0.004,  pel:1,  cd:0.22, aFov:58, hFov:75, rcG:0.07,  rcRX:0.10, bs:[0.04,0.04,0.15],  bc:0xd4b06a, mdl:'pistol'},
  smg:     {n:'SMG',           k:'2', mag:32,  rld:1.4, spd:46,  dmg:0.7,  spr:0.013,  pel:1,  cd:0.08, aFov:60, hFov:75, rcG:0.035, rcRX:0.05, bs:[0.03,0.03,0.12],  bc:0xffaa44, mdl:'smg'},
  ar:      {n:'ASSAULT RIFLE', k:'3', mag:30,  rld:1.8, spd:56,  dmg:1.2,  spr:0.006,  pel:1,  cd:0.10, aFov:55, hFov:75, rcG:0.055, rcRX:0.08, bs:[0.038,0.038,0.18],bc:0xcccccc, mdl:'ar'},
  shotgun: {n:'SHOTGUN',       k:'4', mag:6,   rld:1.9, spd:34,  dmg:0.8,  spr:0.048,  pel:7,  cd:0.76, aFov:62, hFov:75, rcG:0.14,  rcRX:0.20, bs:[0.04,0.04,0.14],  bc:0xffcc66, mdl:'shotgun'},
  sniper:  {n:'SNIPER RIFLE',  k:'5', mag:5,   rld:2.6, spd:105, dmg:3.5,  spr:0.0005, pel:1,  cd:1.2,  aFov:18, hFov:75, rcG:0.20,  rcRX:0.28, bs:[0.028,0.028,0.26],bc:0xcfcfcf, mdl:'sniper'},
  revolver:{n:'REVOLVER',      k:'6', mag:6,   rld:2.3, spd:62,  dmg:2.2,  spr:0.002,  pel:1,  cd:0.52, aFov:56, hFov:75, rcG:0.11,  rcRX:0.16, bs:[0.048,0.048,0.18],bc:0xbb8833, mdl:'revolver'},
  mg:      {n:'MACHINE GUN',   k:'7', mag:80,  rld:3.5, spd:52,  dmg:0.9,  spr:0.018,  pel:1,  cd:0.07, aFov:58, hFov:75, rcG:0.045, rcRX:0.06, bs:[0.04,0.04,0.16],  bc:0xff8844, mdl:'mg'},
  burst:   {n:'BURST RIFLE',   k:'8', mag:24,  rld:1.9, spd:58,  dmg:1.1,  spr:0.005,  pel:1,  cd:0.45, aFov:54, hFov:75, rcG:0.07,  rcRX:0.10, bs:[0.036,0.036,0.17],bc:0x88aaff, mdl:'burst', bst:3, bdt:0.08},
  laser:   {n:'LASER CANNON',  k:'9', mag:20,  rld:2.0, spd:140, dmg:1.5,  spr:0.0,    pel:1,  cd:0.18, aFov:50, hFov:75, rcG:0.025, rcRX:0.03, bs:[0.025,0.025,0.35],bc:0x00ffff, mdl:'laser'},
  dbshot:  {n:'DOUBLE BARREL', k:'0', mag:2,   rld:1.6, spd:30,  dmg:1.5,  spr:0.06,   pel:10, cd:0.85, aFov:64, hFov:75, rcG:0.24,  rcRX:0.32, bs:[0.042,0.042,0.13],bc:0xffee88, mdl:'dbshot'},
  minigun: {n:'MINIGUN',       k:'Q', mag:200, rld:5.0, spd:55,  dmg:0.55, spr:0.024,  pel:1,  cd:0.042,aFov:65, hFov:75, rcG:0.022, rcRX:0.03, bs:[0.034,0.034,0.13],bc:0xff4444, mdl:'minigun'},
  crossbow:{n:'CROSSBOW',      k:'E', mag:1,   rld:2.8, spd:90,  dmg:4.5,  spr:0.0,    pel:1,  cd:2.8,  aFov:48, hFov:75, rcG:0.13,  rcRX:0.18, bs:[0.04,0.018,0.32], bc:0x44ff88, mdl:'crossbow'},
};
const WKEYS = Object.keys(WD);

// ── MATERIALS ──────────────────────────────────────────────────
function mat(c,r=0.7,m=0,e=0){ return new THREE.MeshStandardMaterial({color:c,roughness:r,metalness:m,emissive:e}); }
const M = {
  blk: mat(0x0d0d0d,0.5,0.2),       // matte black polymer
  gry: mat(0x252525,0.7,0.3),        // dark grey metal
  mlt: mat(0x606060,0.4,0.6),        // polished metal
  slt: mat(0x888888,0.3,0.7),        // silver steel
  brn: mat(0x4a3220,0.8),            // walnut wood
  lwd: mat(0x6b4c2a,0.9),            // light wood
  tan: mat(0x8a7355,0.8),            // tan/desert
  red: mat(0xcc2222,0.6,0.1),        // red accent
  grn: mat(0x1a8a1a,0.7),            // olive green
  cyn: mat(0x00bbcc,0.25,0.8,0x002233), // cyan energy
  ylw: mat(0xddaa22,0.4,0.3),        // brass/gold
  blz: mat(0xff6600,0.3,0.2,0x331100), // orange emissive
  rub: mat(0x111111,0.95),           // rubber grip
  alu: mat(0xaaaaaa,0.2,0.8),        // aluminium
  cop: mat(0xb87333,0.4,0.6),        // copper
};

const H = Math.PI/2;

function bx(w,h,d,m){ const s=new THREE.Mesh(new THREE.BoxGeometry(w,h,d),m); s.castShadow=true; return s; }
function cy(r1,r2,h,seg,m){ const s=new THREE.Mesh(new THREE.CylinderGeometry(r1,r2,h,seg),m); s.castShadow=true; return s; }
function cn(r,h,seg,m){ const s=new THREE.Mesh(new THREE.ConeGeometry(r,h,seg),m); s.castShadow=true; return s; }
function sp(r,seg,m){ const s=new THREE.Mesh(new THREE.SphereGeometry(r,seg,seg),m); s.castShadow=true; return s; }

// add(group, mesh, x,y,z, rx,ry,rz)
function a(g,m,x=0,y=0,z=0,rx=0,ry=0,rz=0){
  m.rotation.set(rx,ry,rz); m.position.set(x,y,z); g.add(m); return m;
}

// ── GUN BUILDER ────────────────────────────────────────────────
function buildGun(t){
  const g = new THREE.Group();

  if(t==='pistol'){
    // Slide
    a(g,bx(0.095,0.07,0.28,M.gry),   0, 0.055,-0.06);
    // Slide serrations (6 cuts)
    for(let i=0;i<5;i++) a(g,bx(0.098,0.072,0.008,M.blk), 0,0.055,-0.16+i*0.022);
    // Frame / lower
    a(g,bx(0.090,0.055,0.24,M.blk),  0, 0.005,-0.05);
    // Barrel protruding
    a(g,cy(0.018,0.018,0.06,10,M.mlt),0,0.045,-0.24,H);
    // Muzzle crown ring
    a(g,cy(0.021,0.021,0.008,12,M.slt),0,0.045,-0.27,H);
    // Trigger guard
    a(g,bx(0.088,0.007,0.12,M.blk), 0,-0.026, 0.00);
    a(g,bx(0.007,0.025,0.007,M.blk), 0,-0.018,-0.06);
    a(g,bx(0.007,0.025,0.007,M.blk), 0,-0.018, 0.06);
    // Trigger
    a(g,bx(0.006,0.028,0.012,M.mlt), 0,-0.028, 0.01, 0.3);
    // Grip / handle
    a(g,bx(0.088,0.175,0.082,M.rub), 0,-0.120, 0.058,-0.22);
    // Grip panels texture strips
    for(let i=0;i<4;i++) a(g,bx(0.092,0.012,0.075,M.blk),0,-0.062-i*0.026,0.06,-0.22);
    // Magazine base
    a(g,bx(0.075,0.012,0.072,M.mlt), 0,-0.216, 0.055,-0.22);
    // Front sight post
    a(g,bx(0.006,0.014,0.006,M.mlt), 0, 0.094,-0.22);
    // Rear sight (U-notch)
    a(g,bx(0.032,0.010,0.006,M.mlt), 0, 0.090, 0.02);
    a(g,bx(0.010,0.014,0.006,M.mlt),-0.014,0.095,0.02);
    a(g,bx(0.010,0.014,0.006,M.mlt), 0.014,0.095,0.02);
    // Hammer
    a(g,bx(0.020,0.022,0.016,M.mlt), 0, 0.090, 0.10,-0.3);
    // Rail under barrel
    a(g,bx(0.030,0.008,0.12,M.alu),  0,-0.008,-0.10);
  }

  else if(t==='smg'){
    // Receiver body
    a(g,bx(0.098,0.110,0.40,M.gry),  0, 0.010,-0.04);
    // Upper rail
    a(g,bx(0.030,0.014,0.38,M.alu),  0, 0.068,-0.04);
    // Barrel
    a(g,cy(0.016,0.016,0.34,10,M.mlt),0,0.010,-0.27,H);
    // Barrel shroud vents (5 holes represented as dark cuts)
    for(let i=0;i<5;i++) a(g,bx(0.020,0.022,0.012,M.blk),0,0.026,-0.10-i*0.034);
    // Flash hider
    a(g,cy(0.022,0.018,0.038,6,M.mlt),0,0.010,-0.445,H);
    a(g,cy(0.010,0.010,0.045,6,M.blk),0,0.010,-0.448,H);
    // Foregrip vertical
    a(g,bx(0.048,0.095,0.040,M.rub), 0,-0.058,-0.22,-0.15);
    a(g,bx(0.040,0.010,0.036,M.blk), 0,-0.108,-0.22);
    // Magazine angled
    a(g,bx(0.062,0.200,0.058,M.mlt), 0,-0.110, 0.00,-0.18);
    a(g,bx(0.060,0.012,0.054,M.gry), 0,-0.215, 0.00,-0.18);
    // Pistol grip
    a(g,bx(0.072,0.130,0.072,M.rub), 0,-0.082, 0.20,-0.20);
    // Folding stock arm
    a(g,bx(0.018,0.012,0.22,M.mlt),  0, 0.008, 0.38);
    a(g,bx(0.018,0.012,0.22,M.mlt),  0,-0.030, 0.38);
    a(g,bx(0.018,0.068,0.012,M.mlt), 0,-0.011, 0.49);
    // Charging handle
    a(g,bx(0.008,0.018,0.030,M.mlt), 0.055, 0.030,-0.01);
    // Trigger guard + trigger
    a(g,bx(0.094,0.008,0.10,M.blk),  0,-0.014, 0.10);
    a(g,bx(0.006,0.030,0.012,M.mlt), 0,-0.016, 0.14, 0.3);
    // Front + rear iron sights
    a(g,bx(0.007,0.020,0.007,M.mlt), 0, 0.082,-0.36);
    a(g,bx(0.028,0.014,0.007,M.mlt), 0, 0.080, 0.06);
    a(g,bx(0.008,0.018,0.007,M.mlt),-0.012,0.086,0.06);
    a(g,bx(0.008,0.018,0.007,M.mlt), 0.012,0.086,0.06);
  }

  else if(t==='ar'){
    // Upper receiver
    a(g,bx(0.098,0.080,0.50,M.gry),   0, 0.030,-0.04);
    // Lower receiver
    a(g,bx(0.092,0.065,0.38,M.blk),   0,-0.025,-0.00);
    // Barrel
    a(g,cy(0.016,0.016,0.60,12,M.mlt),0, 0.030,-0.40,H);
    // Gas tube above barrel
    a(g,cy(0.007,0.007,0.36,6,M.mlt), 0, 0.058,-0.28,H);
    // Flash hider (birdcage)
    a(g,cy(0.022,0.016,0.048,6,M.mlt),0, 0.030,-0.70,H);
    for(let i=0;i<6;i++){const ang=i/6*Math.PI*2; a(g,cy(0.005,0.005,0.040,4,M.blk),Math.cos(ang)*0.022,0.030+Math.sin(ang)*0.022,-0.70,H);}
    // Handguard (KeyMod/MLOK style)
    a(g,bx(0.082,0.082,0.32,M.alu),   0, 0.030,-0.26);
    // Rail slots on handguard
    for(let i=0;i<6;i++) a(g,bx(0.085,0.010,0.008,M.gry),0,0.074,-0.12-i*0.034);
    // Trigger guard
    a(g,bx(0.090,0.008,0.110,M.blk),  0,-0.020,-0.00);
    a(g,bx(0.008,0.028,0.008,M.blk),  0,-0.010,-0.055);
    a(g,bx(0.008,0.028,0.008,M.blk),  0,-0.010, 0.055);
    // Trigger + trigger bow
    a(g,bx(0.007,0.034,0.013,M.mlt),  0,-0.025, 0.01, 0.3);
    // Pistol grip
    a(g,bx(0.072,0.140,0.072,M.rub),  0,-0.100, 0.20,-0.22);
    for(let i=0;i<3;i++) a(g,bx(0.075,0.010,0.068,M.blk),0,-0.050-i*0.032,0.20,-0.22);
    // Buffer tube
    a(g,cy(0.025,0.025,0.22,10,M.gry),0,-0.012, 0.42,H);
    // Stock
    a(g,bx(0.062,0.090,0.18,M.blk),   0,-0.020, 0.52);
    a(g,bx(0.055,0.055,0.12,M.rub),   0,-0.020, 0.60);
    // Cheek rest
    a(g,bx(0.058,0.028,0.10,M.blk),   0, 0.035, 0.54);
    // Magazine
    a(g,bx(0.062,0.210,0.070,M.blk),  0,-0.140,-0.06,-0.12);
    a(g,bx(0.058,0.014,0.066,M.mlt),  0,-0.252,-0.06,-0.12);
    // Charging handle (T shape)
    a(g,bx(0.008,0.020,0.028,M.mlt),  0, 0.072, 0.04);
    a(g,bx(0.034,0.014,0.016,M.mlt),  0, 0.078, 0.04);
    // Dust cover
    a(g,bx(0.100,0.018,0.090,M.gry),  0, 0.012,-0.05);
    // Iron sights (flip-up style)
    a(g,bx(0.028,0.008,0.014,M.mlt),  0, 0.076,-0.60);
    a(g,bx(0.007,0.026,0.007,M.mlt),  0, 0.083,-0.60);
    a(g,bx(0.028,0.008,0.014,M.mlt),  0, 0.076, 0.06);
    a(g,bx(0.008,0.020,0.007,M.mlt), -0.012,0.085,0.06);
    a(g,bx(0.008,0.020,0.007,M.mlt),  0.012,0.085,0.06);
    // Bolt catch / selector
    a(g,bx(0.006,0.012,0.018,M.mlt),  0.049, 0.010, 0.10);
    a(g,bx(0.006,0.012,0.018,M.mlt),  0.049, 0.010,-0.04);
  }

  else if(t==='burst'){
    // Same as AR but blue-tinted with selector marking
    a(g,bx(0.098,0.080,0.50,mat(0x1a1a2a,0.7,0.3)), 0, 0.030,-0.04);
    a(g,bx(0.092,0.065,0.38,mat(0x111122,0.8)),      0,-0.025,-0.00);

function getPlatFloor(x,y,z){

}

function fireSingle(){
  const spr=aiming?wD.spr*0.35:wD.spr;
  for(let i=0;i<wD.pel;i++){
    const b=makeBullet(wD);
    const dir=new THREE.Vector3(); camera.getWorldDirection(dir);
    dir.x+=(Math.random()-0.5)*spr; dir.y+=(Math.random()-0.5)*spr; dir.z+=(Math.random()-0.5)*spr; dir.normalize();
    b.position.copy(camera.position).addScaledVector(dir,0.9); b.position.y-=0.08;
    b.quaternion.setFromUnitVectors(new THREE.Vector3(0,0,1),dir);
    b.userData.vel=dir.clone().multiplyScalar(wD.spd); b.userData.life=0;
    scene.add(b); bullets.push(b);
  }
  ammo--; ammoEl.innerText=ammo;
  if(ammo<=0) rldTxt.innerText='탄약 없음! R키로 재장전';
  gunKickZ+=wD.rcG; gunKickRX+=wD.rcRX;
  fireFl.style.background='rgba(255,255,255,0.08)';
  setTimeout(()=>fireFl.style.background='rgba(255,255,255,0)',55);
}
function shoot(){
  if(gameOver||reloading||cdT>0) return;
  if(ammo<=0){ rldTxt.innerText='탄약 없음! R키로 재장전'; return; }
  if(wD.bst){ fireSingle(); bstLeft=wD.bst-1; bstT=wD.bdt; } else fireSingle();
  cdT=wD.cd;
}

// ── UPDATE PLAYER ──────────────────────────────────────────────
function updatePlayer(dt){
  vel.x-=vel.x*10*dt; vel.z-=vel.z*10*dt;
  if(mF) vel.z-=120*dt; if(mB) vel.z+=120*dt;
  if(mL) vel.x-=120*dt; if(mR) vel.x+=120*dt;
  const yawObj=ctrl.getObject();
  const px=yawObj.position.x, pz=yawObj.position.z;
  ctrl.moveRight(vel.x*dt); ctrl.moveForward(-vel.z*dt);
  const dx=yawObj.position.x-px, dz=yawObj.position.z-pz;
  yawObj.position.x=px; yawObj.position.z=pz;
  yawObj.position.x=Math.max(-LIM+2,Math.min(LIM-2,px+dx));
  if(isBlocked(yawObj.position.x,yawObj.position.z,PR)) yawObj.position.x=px;
  yawObj.position.z=Math.max(-LIM+2,Math.min(LIM-2,pz+dz));
  if(isBlocked(yawObj.position.x,yawObj.position.z,PR)) yawObj.position.z=pz;
  const pf=getPlatFloor(yawObj.position.x,yawObj.position.y-EYH,yawObj.position.z);
  const flY=Math.max(0,pf);
  yVel-=GRAV*dt; yawObj.position.y+=yVel*dt;
  const minY=flY+EYH;
  if(yawObj.position.y<=minY){ yawObj.position.y=minY; yVel=0; onGnd=true; } else onGnd=false;
}

// ── UPDATE GUN RECOIL ──────────────────────────────────────────
function updateGunRecoil(dt){
  gunKickZ*=Math.pow(0.04,dt); gunKickRX*=Math.pow(0.04,dt);
  if(Math.abs(gunKickZ)<0.0005) gunKickZ=0;
  if(Math.abs(gunKickRX)<0.0005) gunKickRX=0;
  const ax=aiming?0.02:0.24, ay=aiming?-0.13:-0.24, az=aiming?-0.28:-0.50;
  gunGrp.position.x+=(ax-gunGrp.position.x)*0.16;
  gunGrp.position.y+=(ay-gunGrp.position.y)*0.16;
  gunGrp.position.z+=(az+gunKickZ-gunGrp.position.z)*0.14;
  gunGrp.rotation.x+=(gunKickRX-gunGrp.rotation.x)*0.16;
  gunGrp.rotation.y+=(0-gunGrp.rotation.y)*0.14;
  gunGrp.rotation.z+=(0-gunGrp.rotation.z)*0.14;
}

// ── UPDATE AIM ─────────────────────────────────────────────────
function updateAim(){
  const tFov=aiming?wD.aFov:wD.hFov;
  camera.fov+=(tFov-camera.fov)*0.16; camera.updateProjectionMatrix();

}

function updateTimers(dt){
  if(reloading){ rldT-=dt; rldTxt.innerText='재장전 중... '+Math.max(0,rldT).toFixed(1)+'초'; if(rldT<=0) finishReload(); }
  if(cdT>0) cdT-=dt;
  if(bstLeft>0){ bstT-=dt; if(bstT<=0&&ammo>0&&!reloading){ fireSingle(); bstLeft--; bstT=wD.bdt; } else if(ammo<=0) bstLeft=0; }
  if(wKey==='minigun'&&gunModel) gunModel.rotation.z+=dt*(cdT>0?25:5);
}

    const ef=new THREE.Vector3(e.position.x,0,e.position.z);
    const dir=new THREE.Vector3().subVectors(cf,ef); const dist=dir.length();
    if(dist>0.001) dir.normalize();
    if(dist>2.3){ const op=e.position.clone(); e.position.addScaledVector(dir,0.85*dt); if(isBlocked(e.position.x,e.position.z,0.8)) e.position.copy(op); }
    e.lookAt(camera.position.x,2.2,camera.position.z);
    if(dist>2.3) ud.walkT+=dt*7;
    const sw=dist>2.3?Math.sin(ud.walkT)*0.6:0;
    ud.aLG.rotation.x=sw; ud.aRG.rotation.x=-sw; ud.lLG.rotation.x=-sw; ud.lRG.rotation.x=sw;
    const ratio=Math.max(0,ud.hp/ud.maxHP);
    if(ud.barFg){ ud.barFg.scale.x=ratio; ud.barFg.position.x=(ratio-1)*0.6; ud.barFg.material.color.setHSL(ratio*0.33,1,0.45); ud.barFg.lookAt(camera.position); }
    if(ud.barBg) ud.barBg.lookAt(camera.position);
    if(ud.flashT>0){ ud.flashT-=dt; const t=Math.max(0,ud.flashT/0.15); ud.bm.color.setRGB(1,t*0.4,t*0.4); ud.sm.color.setRGB(0.78+t*0.22,0.56+t*0.44,0.42+t*0.58); }
    if(dist<2.3&&Math.abs(yawObj.position.y-EYH)<3.5){
      playerHP-=13*dt; if(playerHP<0) playerHP=0;
      hpBar.style.width=playerHP+'%';
      hitFl.style.background='rgba(255,0,0,0.2)';
      setTimeout(()=>hitFl.style.background='rgba(255,0,0,0)',120);
      if(playerHP<=0){ endGame(); return; }
    }
  }
}

// ── UPDATE BULLETS ─────────────────────────────────────────────
function updateBullets(dt){
  for(let i=bullets.length-1;i>=0;i--){
    const b=bullets[i];
    b.position.addScaledVector(b.userData.vel,dt); b.userData.life+=dt;
    if(isBlocked(b.position.x,b.position.z,0.1)){ scene.remove(b); bullets.splice(i,1); continue; }
    let rm=false;
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j]; const ud=e.userData;
      if(Math.abs(b.position.x-e.position.x)<0.95&&Math.abs(b.position.z-e.position.z)<0.95&&b.position.y>0.2&&b.position.y<4.0){
        ud.hp-=wD.dmg; ud.flashT=0.15;
        dmgTxt.innerText='-'+wD.dmg.toFixed(1)+' DMG'; ehpFlash=1.5;
        if(ud.hp>0) ehpTxt.innerText='적 HP: '+ud.hp.toFixed(1)+' / '+ud.maxHP;
        else { spawnFX(e.position.clone()); scene.remove(e); enemies.splice(j,1); score+=100; scoreEl.innerText=score; ehpTxt.innerText='적 처치!'; }
        scene.remove(b); bullets.splice(i,1); rm=true; break;
      }
    }
    if(rm) continue;
    if(b.userData.life>3.8){ scene.remove(b); bullets.splice(i,1); }
  }
  if(ehpFlash>0){ ehpFlash-=dt; if(ehpFlash<=0){ ehpTxt.innerText=''; dmgTxt.innerText=''; } }
}

function spawnFX(pos){
  for(let i=0;i<10;i++){
    const p=new THREE.Mesh(new THREE.SphereGeometry(0.07+Math.random()*0.06,4,4),new THREE.MeshBasicMaterial({color:new THREE.Color().setHSL(0,0.9,0.3+Math.random()*0.3)}));
    p.position.copy(pos); p.position.y=1.5+Math.random()*1.5;
    p.userData.vel=new THREE.Vector3((Math.random()-0.5)*6,1+Math.random()*3,(Math.random()-0.5)*6); p.userData.life=0.55+Math.random()*0.4;
    scene.add(p); parts.push(p);
  }
}
function updateFX(dt){ for(let i=parts.length-1;i>=0;i--){ const p=parts[i]; p.userData.vel.y-=14*dt; p.position.addScaledVector(p.userData.vel,dt); p.userData.life-=dt; if(p.userData.life<=0){scene.remove(p);parts.splice(i,1);} } }

// ── MAIN LOOP ──────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  const now=performance.now(), dt=Math.min((now-lastT)/1000,0.05); lastT=now;
  if(ctrl.isLocked&&!gameOver){
    updatePlayer(dt); updateGunRecoil(dt); updateAim();
    updateTimers(dt); updateEnemies(dt); updateBullets(dt); updateFX(dt);
  }
  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{ camera.aspect=innerWidth/innerHeight; camera.updateProjectionMatrix(); renderer.setSize(innerWidth,innerHeight); });

hpBar.style.width='100%';
rebuildGun('pistol');
updateWBar();
resetGame();
animate();
</script>
